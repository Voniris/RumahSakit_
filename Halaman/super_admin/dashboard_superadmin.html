<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manajemen Pengguna – Vamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Paste your super_admin.css inline here or keep as external link ── */
    /* The JS below handles all API logic; styles remain unchanged from original */
  </style>
  <link rel="stylesheet" href="super_admin.css" />
</head>
<body>
<div class="dashboard-container">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../assets/logo/Logors.png" alt="Logo"
         onerror="this.src='https://cdn-icons-png.flaticon.com/512/3063/3063206.png'"/>
    <span>Rumah Sakit<br><small>Viamedika</small></span>
  </div>
  <a href="#" class="nav-item active">
    <img src="../../assets/icons/manajemeen.png" alt="icon" class="nav-icon"
         onerror="this.style.display='none'"/>
    Manajemen Pengguna
  </a>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="top-profile">
    <div class="info-user">
      <span class="role">Petugas</span>
      <span class="name">Zanira Pahlevi</span>
    </div>
    <div class="avatar-circle">ZP</div>
  </div>

  <div class="content">
    <div class="page-header">
      <div>
        <h1>Manajemen Pengguna</h1>
        <p>Kelola akun pengguna dan berikan role sesuai jabatannya.</p>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
          Daftar Pengguna
        </div>
      </div>

      <!-- toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Cari nama, email, atau jabatan..."
                 oninput="filterTable()"/>
        </div>

        <div class="filter-select">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          <select id="roleFilter" onchange="filterTable()"
                  style="border:none;outline:none;font-family:inherit;font-size:13px;color:inherit;background:transparent;cursor:pointer;">
            <option value="">Semua role</option>
            <option value="Dokter">Dokter</option>
            <option value="Perawat">Perawat</option>
            <option value="Apoteker">Apoteker</option>
            <option value="Admin">Admin</option>
            <option value="Petugas">Petugas</option>
          </select>
        </div>

        <button class="btn-add" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Tambah Pengguna
        </button>
      </div>

      <!-- loading state -->
      <div id="loadingState" style="text-align:center;padding:40px;display:none;">
        <svg style="width:32px;height:32px;animation:spin 1s linear infinite;color:#6366f1"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <p style="margin-top:12px;color:#6b7280;font-size:14px;">Memuat data pengguna...</p>
      </div>

      <!-- error state -->
      <div id="errorState" style="text-align:center;padding:40px;display:none;">
        <svg style="width:40px;height:40px;color:#ef4444;margin-bottom:12px"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p id="errorMsg" style="color:#ef4444;font-size:14px;margin:0">Gagal memuat data.</p>
        <button onclick="loadUsers()" style="margin-top:12px;padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">
          Coba Lagi
        </button>
      </div>

      <!-- table -->
      <table id="userTable">
        <thead>
          <tr>
            <th>No</th>
            <th>Nama Lengkap</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>

      <!-- footer -->
      <div class="card-footer">
        <span class="footer-info" id="footerInfo">–</span>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <h2 id="modalTitle">Tambah Pengguna</h2>
    <div class="form-group">
      <label>Nama Lengkap</label>
      <input type="text" id="formNama" placeholder="Masukkan nama lengkap"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="formEmail" placeholder="email@vamedika.id"/>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="formRole">
        <option value="">-- Pilih Role --</option>
        <option>Dokter</option>
        <option>Perawat</option>
        <option>Apoteker</option>
        <option>Admin</option>
        <option>Petugas</option>
      </select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="formStatus">
        <option value="Aktif">Aktif</option>
        <option value="Nonaktif">Nonaktif</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" id="btnSave" onclick="saveUser()">Simpan</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
       stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  <span id="toastMsg">Berhasil disimpan!</span>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
  // ─────────────────────────────────────────────────────────────
  // CONFIG – ganti BASE_URL sesuai base URL backend Anda
  // ─────────────────────────────────────────────────────────────
  const BASE_URL = 'http://localhost:8000/api/users'; // contoh: 'https://api.vamedika.id/api'

  // Jika API butuh token, letakkan di sini
  // const TOKEN = localStorage.getItem('token') || '';
  function authHeaders() {
    const token = localStorage.getItem('token') || '';
    return {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
    };
  }

  // ─────────────────────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────────────────────
  let allUsers    = [];   // data dari API
  let currentPage = 1;
  let editingId   = null;
  const PAGE_SIZE = 5;

  // ─────────────────────────────────────────────────────────────
  // API CALLS
  // ─────────────────────────────────────────────────────────────

  /** GET /users */
  async function loadUsers() {
    setLoading(true);
    try {
      const res = await fetch(`${BASE_URL}/users`, {
        method: 'GET',
        headers: authHeaders(),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // Normalkan: sesuaikan key jika berbeda dari API Anda
      // Misal API mengembalikan { data: [...] } atau langsung array
      allUsers = Array.isArray(data) ? data : (data.data ?? []);
      setLoading(false);
      render();
    } catch (err) {
      setError('Gagal memuat data pengguna. ' + err.message);
    }
  }

  /** POST /users */
  async function createUser(payload) {
    const res = await fetch(`${BASE_URL}/users`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    return res.json();
  }

  /** PUT /users/{id} */
  async function updateUser(id, payload) {
    const res = await fetch(`${BASE_URL}/users/${id}`, {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    return res.json();
  }

  /** DELETE /users/{id}  (soft delete) */
  async function deleteUser(id) {
    const res = await fetch(`${BASE_URL}/users/${id}`, {
      method: 'DELETE',
      headers: authHeaders(),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    return res.json().catch(() => ({}));
  }

  // ─────────────────────────────────────────────────────────────
  // UI HELPERS
  // ─────────────────────────────────────────────────────────────
  function setLoading(show) {
    document.getElementById('loadingState').style.display = show ? 'block' : 'none';
    document.getElementById('errorState').style.display   = 'none';
    document.getElementById('userTable').style.display    = show ? 'none' : '';
    document.getElementById('footerInfo').textContent     = show ? '–' : '';
    document.getElementById('pagination').innerHTML       = '';
  }

  function setError(msg) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display   = 'block';
    document.getElementById('userTable').style.display    = 'none';
    document.getElementById('errorMsg').textContent       = msg;
    document.getElementById('footerInfo').textContent     = '–';
    document.getElementById('pagination').innerHTML       = '';
  }

  // ─────────────────────────────────────────────────────────────
  // ROLE CONFIG
  // ─────────────────────────────────────────────────────────────
  const roleCfg = {
    Dokter:   { cls:'role-dokter',   icon:'<path d="M12 2a1 1 0 0 1 1 1v8h8a1 1 0 0 1 0 2h-8v8a1 1 0 0 1-2 0v-8H3a1 1 0 0 1 0-2h8V3a1 1 0 0 1 1-1z"/>' },
    Perawat:  { cls:'role-perawat',  icon:'<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>' },
    Apoteker: { cls:'role-apoteker', icon:'<path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>' },
    Admin:    { cls:'role-admin',    icon:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' },
    Petugas:  { cls:'role-petugas',  icon:'<circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>' },
  };

  function initials(name) {
    if (!name) return '?';
    return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
  }

  // ─────────────────────────────────────────────────────────────
  // FILTER & RENDER
  // ─────────────────────────────────────────────────────────────
  function getFiltered() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const r = document.getElementById('roleFilter').value;

    return allUsers.filter(u => {
      // Sesuaikan key nama/email/role dengan response API Anda
      const nama  = (u.nama  || u.name         || u.full_name || '').toLowerCase();
      const email = (u.email || u.email_address || '').toLowerCase();
      const role  = (u.role  || u.jabatan       || u.position  || '');
      const matchQ = !q || nama.includes(q) || email.includes(q) || role.toLowerCase().includes(q);
      const matchR = !r || role === r;
      return matchQ && matchR;
    });
  }

  function render() {
    const filtered = getFiltered();
    const total    = filtered.length;
    const pages    = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > pages) currentPage = pages;

    const slice = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
    const tbody = document.getElementById('userTableBody');

    tbody.innerHTML = slice.map((u, i) => {
      const no     = (currentPage-1)*PAGE_SIZE + i + 1;
      // Normalkan field dari API
      const nama   = u.nama   || u.name         || u.full_name || '-';
      const email  = u.email  || u.email_address || '-';
      const role   = u.role   || u.jabatan       || u.position  || '-';
      const status = u.status || u.is_active === false ? 'Nonaktif' : (u.is_active === true ? 'Aktif' : (u.status || 'Aktif'));
      const id     = u.id     || u._id;

      const cfg         = roleCfg[role] || {};
      const statusClass = status === 'Aktif' ? 'aktif' : 'nonaktif';

      return `
        <tr>
          <td class="no">${no}</td>
          <td>
            <div class="user-cell">
              <div class="avatar">${initials(nama)}</div>
              <span class="user-name">${nama}</span>
            </div>
          </td>
          <td class="email">${email}</td>
          <td>
            <span class="role-badge ${cfg.cls || ''}">
              ${cfg.icon ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${cfg.icon}</svg>` : ''}
              ${role}
            </span>
          </td>
          <td>
            <span class="status-dot ${statusClass}">
              <span class="dot ${status === 'Aktif' ? '' : 'inactive'}"></span>
              ${status}
            </span>
          </td>
          <td>
            <div class="actions">
              <button class="btn-icon" onclick="editUser('${id}')" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="btn-icon btn-icon-danger" onclick="confirmDelete('${id}', '${nama.replace(/'/g, "\\'")}')" title="Hapus">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>`;
    }).join('');

    // footer
    const from = total ? (currentPage-1)*PAGE_SIZE+1 : 0;
    const to   = Math.min(currentPage*PAGE_SIZE, total);
    document.getElementById('footerInfo').textContent = `Menampilkan ${from}–${to} dari ${total} pengguna`;

    // pagination
    const pag = document.getElementById('pagination');
    let html = `<button class="page-btn" onclick="goPage(${currentPage-1})"
      ${currentPage===1?'disabled style="opacity:.4;cursor:not-allowed"':''}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>`;

    for (let p = 1; p <= pages; p++) {
      if (pages > 6 && p > 3 && p < pages - 1) {
        if (p === 4) html += `<button class="page-btn" style="cursor:default">…</button>`;
        continue;
      }
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }

    html += `<button class="page-btn" onclick="goPage(${currentPage+1})"
      ${currentPage===pages?'disabled style="opacity:.4;cursor:not-allowed"':''}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;

    pag.innerHTML = html;
  }

  function goPage(p) {
    const pages = Math.ceil(getFiltered().length / PAGE_SIZE);
    if (p < 1 || p > pages) return;
    currentPage = p;
    render();
  }

  function filterTable() {
    currentPage = 1;
    render();
  }

  // ─────────────────────────────────────────────────────────────
  // MODAL
  // ─────────────────────────────────────────────────────────────
  function openModal(id = null) {
    editingId = id;
    document.getElementById('modalTitle').textContent = id ? 'Edit Pengguna' : 'Tambah Pengguna';
    if (id) {
      const u    = allUsers.find(u => (u.id || u._id) == id);
      const nama = u.nama || u.name || u.full_name || '';
      document.getElementById('formNama').value   = nama;
      document.getElementById('formEmail').value  = u.email || u.email_address || '';
      document.getElementById('formRole').value   = u.role  || u.jabatan || u.position || '';
      document.getElementById('formStatus').value = u.status || (u.is_active === false ? 'Nonaktif' : 'Aktif');
    } else {
      document.getElementById('formNama').value   = '';
      document.getElementById('formEmail').value  = '';
      document.getElementById('formRole').value   = '';
      document.getElementById('formStatus').value = 'Aktif';
    }
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    editingId = null;
  }

  function closeOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function editUser(id) { openModal(id); }

  async function saveUser() {
    const nama   = document.getElementById('formNama').value.trim();
    const email  = document.getElementById('formEmail').value.trim();
    const role   = document.getElementById('formRole').value;
    const status = document.getElementById('formStatus').value;

    if (!nama || !email || !role) { alert('Harap lengkapi semua field.'); return; }

    // Sesuaikan key payload dengan yang diharapkan API Anda
    const payload = { nama, email, role, status };
    // Jika API Anda pakai key berbeda, ubah di sini, misal:
    // const payload = { name: nama, email, role, is_active: status === 'Aktif' };

    const btn = document.getElementById('btnSave');
    btn.disabled     = true;
    btn.textContent  = 'Menyimpan...';

    try {
      if (editingId) {
        const updated = await updateUser(editingId, payload);
        // Update local state
        const idx = allUsers.findIndex(u => (u.id || u._id) == editingId);
        if (idx !== -1) allUsers[idx] = updated.data ?? updated;
        showToast('Data pengguna berhasil diperbarui!');
      } else {
        const created = await createUser(payload);
        allUsers.push(created.data ?? created);
        showToast('Pengguna baru berhasil ditambahkan!');
      }
      closeModal();
      render();
    } catch (err) {
      alert('Gagal menyimpan: ' + err.message);
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Simpan';
    }
  }

  async function confirmDelete(id, nama) {
    if (!confirm(`Hapus pengguna "${nama}"?\nData akan di-nonaktifkan (soft delete).`)) return;
    try {
      await deleteUser(id);
      allUsers = allUsers.filter(u => (u.id || u._id) != id);
      render();
      showToast('Pengguna berhasil dihapus!');
    } catch (err) {
      alert('Gagal menghapus: ' + err.message);
    }
  }

  // ─────────────────────────────────────────────────────────────
  // TOAST
  // ─────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ─────────────────────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────────────────────
  loadUsers();
</script>
</body>
</html>
