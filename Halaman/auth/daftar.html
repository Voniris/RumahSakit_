<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Daftar</title>
    <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
    <div class="container">
        <div class="form-side">
            <div class="logo">
                <img src="../../assets/logo/Logors.png" alt="Logo" width="40" />
                <span class="logo-name">Rumah Sakit<br><small>Viamedika</small></span>
            </div>
            <h1>Daftar</h1>


                        <form id="formDaftar">
               
                <div class="form-group">
                    <label>Alamat Email</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan Alamat Email" required />
                </div>

                <div class="form-group">
                    <label>Kode Verifikasi</label>
                    <div class="verify-wrapper">
                        <input type="text" id="kode_verifikasi" name="kode_verifikasi" placeholder="Masukkan Kode" required />
                        <button type="button" class="btn-kirim">Kirim Kode</button>
                    </div>
                </div>

                <div class="form-group password-group">
                    <label>Kata Sandi</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan Kata Sandi" required />
                    <span class="toggle-password" onclick="togglePassword('password', this)">
                        <img src="../../assets/icons/closedeyes.png" width="20" />
                    </span>
                </div>

                <div class="form-group password-group">
                    <label>Konfirmasi Kata Sandi</label>
                    <input type="password" id="password_confirm" name="password_confirm" placeholder="Konfirmasi Kata Sandi" required />
                    <span class="toggle-password" onclick="togglePassword('password_confirm', this)">
                        <img src="../../assets/icons/closedeyes.png" width="20" />
                    </span>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="agree" name="agree" required />
                    <label for="agree">Saya menyetujui syarat & ketentuan</label>
                </div>

                <button type="submit" class="btn-primary" id="btnSubmitDaftar">Daftar</button>
                <br> <br>
                <p class="redirect">Sudah punya akun? <a href="masuk.html">Masuk</a></p>
            </form>
        </div>

        <div class="image-side">
            <img src="../../assets/images/Hospital.png" />
        </div>
    </div>

    <script src="../../js/main.js"></script>

    <script>
        // ==========================================
        // 1. LOGIKA TOMBOL "KIRIM KODE" (Tahap 1)
        // ==========================================
        document.querySelector('.btn-kirim').addEventListener('click', async function() {
            const btnKirim = this;
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password_confirm').value;

            if (!email || !password || !passwordConfirm) {
                alert("Isi Email dan Kata Sandi dulu ya sebelum minta kode!");
                return;
            }

            if (password !== passwordConfirm) {
                alert("Kata Sandi dan Konfirmasi Kata Sandi tidak cocok!");
                return;
            }

            btnKirim.innerText = "Mengirim...";
            btnKirim.disabled = true;

            // Kita cuma kirim Email & Password sesuai desain UI kamu
            const payloadRegister = {
                email: email,
                password: password,
                password_confirmation: passwordConfirm
            };

            try {
                const response = await fetch('http://localhost:8000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payloadRegister)
                });
                
                const data = await response.json();

                if(response.status === 201 || response.ok || data.success) {
                    alert("Kode OTP berhasil dikirim! Cek email kamu.");
                } else {
                    // Kalau Backend protes minta NIK/Nama, error-nya bakal muncul di sini
                    alert("Gagal kirim kode: " + (data.message || "Pastikan API sudah disesuaikan dengan desain form"));
                }
            } catch (error) {
                alert("Error: Server Backend belum jalan atau link salah!");
            } finally {
                btnKirim.innerText = "Kirim Kode";
                btnKirim.disabled = false;
            }
        });


        // ==========================================
        // 2. LOGIKA TOMBOL "DAFTAR" (Tahap 2)
        // ==========================================
        document.getElementById('formDaftar').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const btnSubmit = document.getElementById('btnSubmitDaftar');
            
            if(!document.getElementById('agree').checked) return alert("Centang dulu syarat & ketentuannya ya!");
            
            const otp = document.getElementById('kode_verifikasi').value;
            if(!otp) return alert("Masukkan kode verifikasi yang dikirim ke emailmu!");

            btnSubmit.innerText = "Memproses...";
            btnSubmit.disabled = true;

            const payloadVerify = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                password_confirmation: document.getElementById('password_confirm').value, 
                otp: otp
            };

            try {
                const response = await fetch('http://localhost:8000/api/auth/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payloadVerify)
                });
                
                const data = await response.json();

                if(response.status === 200 || response.ok || data.success) {
                    alert("Pendaftaran Berhasil! Silakan masuk.");
                    window.location.href = "masuk.html"; 
                } else {
                    alert("Pendaftaran Gagal: " + (data.message || "Kode OTP salah."));
                }
            } catch (error) {
                alert("Error: Tidak dapat terhubung ke server.");
            } finally {
                btnSubmit.innerText = "Daftar";
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
