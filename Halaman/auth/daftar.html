<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Daftar</title>
    <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
    <div class="container">
        <div class="form-side">
            <div class="logo">
                <img src="../../assets/logo/Logors.png" alt="Logo" width="40" />
                <span class="logo-name">Rumah Sakit<br><small>Viamedika</small></span>
            </div>
            <h1>Daftar Akun</h1>
        
            <div class="roles-toggle">
                <button type="button" class="btn-roles active" id="btnPasien" onclick="setRoles('pasien')">Pasien</button>
                <button type="button" class="btn-roles" id="btnPetugas" onclick="setRoles('petugas')">Petugas</button>
            </div>
            <input type="hidden" id="selectedroles" value="pasien" />

            <form id="formDaftar">
               
                <div class="form-group">
                    <label>Alamat Email</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan Alamat Email" required />
                </div>

                <div class="form-group">
                    <label>Kode Verifikasi</label>
                    <div class="verify-wrapper">
                        <input type="text" id="kode_verifikasi" name="kode_verifikasi" placeholder="Masukkan Kode" required />
                        <button type="button" class="btn-kirim">Kirim Kode</button>
                    </div>
                </div>

                <div class="form-group password-group">
                    <label>Kata Sandi</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan Kata Sandi" required />
                    <span class="toggle-password" onclick="togglePassword('password', this)">
                        <img src="../../assets/icons/closedeyes.png" width="20" />
                    </span>
                </div>

                <div class="form-group password-group">
                    <label>Konfirmasi Kata Sandi</label>
                    <input type="password" id="password_confirm" name="password_confirm" placeholder="Konfirmasi Kata Sandi" required />
                    <span class="toggle-password" onclick="togglePassword('password_confirm', this)">
                        <img src="../../assets/icons/closedeyes.png" width="20" />
                    </span>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="agree" name="agree" required />
                    <label for="agree">Saya menyetujui syarat & ketentuan</label>
                </div>

                <button type="submit" class="btn-primary" id="btnSubmitDaftar">Daftar</button>
                <br> <br>
                <p class="redirect">Sudah punya akun? <a href="masuk.html">Masuk</a></p>
            </form>
        </div>

        <div class="image-side">
            <img src="../../assets/images/Hospital.png" />
        </div>
    </div>

    <script src="../../js/main.js"></script>

<script>
    function setRoles(roles) {
        document.getElementById('selectedroles').value = roles;
        document.getElementById('btnPasien').classList.toggle('active', roles === 'pasien');
        document.getElementById('btnPetugas').classList.toggle('active', roles === 'petugas');
    }
    document.querySelector('.btn-kirim').addEventListener('click', async function() {
        const btnKirim = this;
        const email = document.getElementById('email').value;

        if (!email) {
            showAlert('warning', 'Email Kosong', 'Masukkan alamat email dulu ya!');
            return;
        }
        otpVerified = false;
        lockPasswordFields();

        btnKirim.innerText = "Mengirim...";
        btnKirim.disabled = true;

        try {
            const response = await fetch('http://kelompok1-rs.test/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            const data = await response.json();

            if (response.status === 201 || response.ok || data.success) {
                showAlert('success', 'Kode Terkirim!', 'Kode OTP berhasil dikirim. Cek email kamu ya.');
            } else {
                showAlert('error', 'Gagal Mengirim Kode', data.message || 'Pastikan server sudah berjalan.');
            }
        } catch (error) {
            showAlert('error', 'Koneksi Gagal', 'Tidak dapat terhubung ke server.');
        } finally {
            btnKirim.innerText = "Kirim Kode";
            btnKirim.disabled = false;
        }
    });
    document.getElementById('formDaftar').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btnSubmit = document.getElementById('btnSubmitDaftar');

        if (!document.getElementById('email').value) {
            showAlert('warning', 'Email Kosong', 'Masukkan alamat email dulu!');
            return;
        }

        if (!document.getElementById('kode_verifikasi').value) {
            showAlert('warning', 'Kode Kosong', 'Masukkan kode OTP yang dikirim ke emailmu!');
            return;
        }

        if (!document.getElementById('agree').checked) {
            showAlert('warning', 'Syarat & Ketentuan', 'Centang dulu syarat & ketentuannya!');
            return;
        }

        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('password_confirm').value;

        if (password !== passwordConfirm) {
            showAlert('warning', 'Kata Sandi Tidak Cocok', 'Kata Sandi dan Konfirmasi tidak cocok!');
            return;
        }

        btnSubmit.innerText = "Memproses...";
        btnSubmit.disabled = true;

        try {
            const response = await fetch('http://kelompok1-rs.test/api/auth/verify-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: password,
                    password_confirmation: passwordConfirm,
                    otp: document.getElementById('kode_verifikasi').value
                })
            });

            const data = await response.json();

            if (response.status === 200 || response.ok || data.success) {
                showAlert('success', 'Pendaftaran Berhasil!', 'Akun kamu sudah aktif. Silakan masuk.', () => {
                    window.location.href = 'masuk.html';
                });
            } else {
                showAlert('error', 'Pendaftaran Gagal', data.message || 'Terjadi kesalahan.');
            }
        } catch (error) {
            showAlert('error', 'Koneksi Gagal', 'Tidak dapat terhubung ke server.');
        } finally {
            btnSubmit.innerText = "Daftar";
            btnSubmit.disabled = false;
        }
    });
</script>
</body>
</html>
