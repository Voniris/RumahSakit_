<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atur Ulang Kata Sandi - Rumah Sakit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
  <div class="container">
    <!-- Kiri: Form -->
    <div class="form-side reset-side">
      <div class="logo">
    <img src="../../assets/logo/Logors.png" alt="Logo" width="40" />
    <span class="logo-name">Rumah Sakit<br><small>Viamedika</small></span>
  </div>
      <h1>Atur Ulang Kata Sandi</h1>

      <form>
        <!-- Email + Tombol Kirim Kode -->
        <div class="form-group email-row">
          <label>Email<span class="required">*</span></label>
          <div class="email-input-row">
            <input type="email" placeholder="Email" />
            <button type="button" class="btn-kirim">Kirim Kode</button>
          </div>
        </div>

        <!-- Kode Verifikasi -->
        <div class="form-group">
          <label>Masukkan kode Verifikasi<span class="required">*</span></label>
          <input type="text" placeholder="Kode Verifikasi" />
        </div>

        <!-- Kata Sandi Baru -->
        <div class="form-group password-group">
          <label>Kata Sandi<span class="required">*</span></label>
          <input type="password" id="password1" placeholder="Kata Sandi" />
          <span class="toggle-password" onclick="togglePassword('password1', this)">
            <img src="../../assets/icons/closedeyes.png" width="20" />
          </span>
        </div>

        <!-- Konfirmasi Kata Sandi -->
        <div class="form-group password-group">
          <label>Konfirmasi Kata Sandi<span class="required">*</span></label>
          <input type="password" id="password2" placeholder="Konfirmasi Kata Sandi" />
          <span class="toggle-password" onclick="togglePassword('password2', this)">
            <img src="../../assets/icons/closedeyes.png" width="20" />
          </span>
        </div>

        <button type="submit" class="btn-primary">Simpan</button>
      </form>
    </div>

    <!-- Kanan: Gambar -->
    <div class="image-side">
      <img src="../../assets/images/Hospital.png" alt="Hospital" />
    </div>
  </div>

  <script src="../../js/main.js"></script>
</body>
</html>
