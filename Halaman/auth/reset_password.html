<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atur Ulang Kata Sandi - Rumah Sakit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
  <div class="container">
    <div class="form-side reset-side">
      <div class="logo">
        <img src="../../assets/logo/Logors.png" alt="Logo" width="40" />
        <span class="logo-name">Rumah Sakit<br><small>Viamedika</small></span>
      </div>
      <h1>Atur Ulang Kata Sandi</h1>

      <form id="formReset">
        
        <div class="form-group email-row">
          <label>Email<span class="required">*</span></label>
          <div class="email-input-row">
            <input type="email" id="email_reset" placeholder="Email" required />
            <button type="button" class="btn-kirim" id="btnKirimKode">Kirim Kode</button>
          </div>
        </div>

        <div class="form-group">
          <label>Masukkan kode Verifikasi<span class="required">*</span></label>
          <input type="text" id="kode_verifikasi" placeholder="Kode Verifikasi" required />
        </div>

        <div class="form-group password-group">
          <label>Kata Sandi<span class="required">*</span></label>
          <input type="password" id="password_reset" placeholder="Kata Sandi" required />
          <span class="toggle-password" onclick="togglePassword('password_reset', this)">
            <img src="../../assets/icons/closedeyes.png" width="20" />
          </span>
        </div>

        <div class="form-group password-group">
          <label>Konfirmasi Kata Sandi<span class="required">*</span></label>
          <input type="password" id="password_confirm" placeholder="Konfirmasi Kata Sandi" required />
          <span class="toggle-password" onclick="togglePassword('password_confirm', this)">
            <img src="../../assets/icons/closedeyes.png" width="20" />
          </span>
        </div>

        <button type="submit" class="btn-primary" id="btnSubmitReset">Simpan</button>
      </form>
    </div>

    <div class="image-side">
      <img src="../../assets/images/Hospital.png" alt="Hospital" />
    </div>
  </div>

  <script src="../../js/main.js"></script>

  <script>
    // ====================================================
    // AKSI 1: KIRIM KODE OTP KE EMAIL
    // ====================================================
    document.getElementById('btnKirimKode').addEventListener('click', async function() {
        const emailInput = document.getElementById('email_reset').value;
        const btnKirim = document.getElementById('btnKirimKode');

        if (!emailInput) {
            alert("Harap isi alamat email terlebih dahulu!");
            return;
        }

        btnKirim.innerText = "Mengirim...";
        btnKirim.disabled = true;

        try {
            // Tembak API Lupa Password (sesuaikan URL jika di Laravel berbeda, biasanya /auth/forgot-password)
            const response = await fetch('http://localhost:8000/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ email: emailInput })
            });
            const data = await response.json();

            if (response.ok || data.success) {
                alert("Kode verifikasi telah dikirim ke email kamu. Silakan cek inbox/spam!");
            } else {
                alert("Gagal mengirim kode: " + (data.message || "Email tidak terdaftar."));
            }
        } catch (error) {
            alert("Error: Tidak dapat terhubung ke server saat mengirim kode.");
        } finally {
            btnKirim.innerText = "Kirim Kode";
            btnKirim.disabled = false;
        }
    });

    // ====================================================
    // AKSI 2: SIMPAN PASSWORD BARU
    // ====================================================
    document.getElementById('formReset').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btnSubmit = document.getElementById('btnSubmitReset');
        
        const password = document.getElementById('password_reset').value;
        const passwordConfirm = document.getElementById('password_confirm').value;

        // Validasi simpel dari frontend sebelum dikirim ke backend
        if (password !== passwordConfirm) {
            alert("Kata sandi dan Konfirmasi kata sandi tidak cocok!");
            return;
        }

        btnSubmit.innerText = "Menyimpan...";
        btnSubmit.disabled = true;

        const payload = {
            email: document.getElementById('email_reset').value,
            token: document.getElementById('kode_verifikasi').value, // OTP/Token dari email
            password: password,
            password_confirmation: passwordConfirm
        };

        try {
            // Tembak API Reset Password (biasanya /auth/reset-password)
            const response = await fetch('http://localhost:8000/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            if(response.status === 200 || data.success) {
                alert("Kata sandi berhasil diatur ulang! Silakan login dengan kata sandi baru.");
                window.location.href = "masuk.html"; // Balik ke halaman login
            } else {
                alert("Gagal mengatur ulang: " + (data.message || "Kode verifikasi salah atau kadaluarsa."));
            }
        } catch (error) {
            alert("Error: Tidak dapat terhubung ke server Backend.");
        } finally {
            btnSubmit.innerText = "Simpan";
            btnSubmit.disabled = false;
        }
    });
  </script>
</body>
</html>
