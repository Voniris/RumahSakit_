<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atur Ulang Kata Sandi - Rumah Sakit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>
  <div class="container">
    <div class="form-side reset-side">
      <div class="logo">
        <img src="../../assets/logo/Logors.png" alt="Logo" width="40" />
        <span class="logo-name">Rumah Sakit<br><small>Viamedika</small></span>
      </div>
      <h1>Atur Ulang Kata Sandi</h1>

      <form id="formReset">
        
        <div class="form-group email-row">
          <label>Email<span class="required">*</span></label>
          <div class="email-input-row">
            <input type="email" id="email_reset" placeholder="Email" required />
            <button type="button" class="btn-kirim" id="btnKirimKode">Kirim Kode</button>
          </div>
        </div>

        <div class="form-group">
          <label>Masukkan kode Verifikasi<span class="required">*</span></label>
          <input type="text" id="kode_verifikasi" placeholder="Kode Verifikasi OTP" required />
        </div>

        <div class="form-group password-group">
          <label>Kata Sandi<span class="required">*</span></label>
          <input type="password" id="password_reset" placeholder="Kata Sandi Baru" required />
          <span class="toggle-password" onclick="togglePassword('password_reset', this)">
            <img src="../../assets/icons/closedeyes.png" width="20" />
          </span>
        </div>

        <div class="form-group password-group">
          <label>Konfirmasi Kata Sandi<span class="required">*</span></label>
          <input type="password" id="password_confirm" placeholder="Konfirmasi Kata Sandi Baru" required />
          <span class="toggle-password" onclick="togglePassword('password_confirm', this)">
            <img src="../../assets/icons/closedeyes.png" width="20" />
          </span>
        </div>

        <button type="submit" class="btn-primary" id="btnSubmitReset">Simpan</button>
      </form>
    </div>

    <div class="image-side">
      <img src="../../assets/images/Hospital.png" alt="Hospital" />
    </div>
  </div>

  <script src="../../js/main.js"></script>

  <script>
    const BASE_URL = 'https://daftar4b06.vps-poliban.my.id/api';

    document.getElementById('btnKirimKode').addEventListener('click', async function() {
        const emailInput = document.getElementById('email_reset').value;
        const btnKirim = document.getElementById('btnKirimKode');

        if (!emailInput) {
            showAlert('warning', 'Peringatan', 'Harap isi alamat email terlebih dahulu!');
            return;
        }

        btnKirim.innerText = "Mengirim...";
        btnKirim.disabled = true;

        try {
            const response = await fetch(`${BASE_URL}/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ email: emailInput })
            });
            const data = await response.json();

            if (response.ok || data.success) {
                showAlert('success', 'Berhasil Dikirim', 'Kode OTP telah dikirim ke email kamu. Silakan cek Inbox atau folder Spam');
            } else {
                showAlert('error', 'Gagal', data.message || "Email tidak terdaftar.");
            }
        } catch (error) {
            showAlert('error', 'Koneksi Gagal', 'Tidak dapat terhubung ke server saat mengirim kode.');
        } finally {
            btnKirim.innerText = "Kirim Kode";
            btnKirim.disabled = false;
        }
    });
    document.getElementById('formReset').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btnSubmit = document.getElementById('btnSubmitReset');
        
        const password = document.getElementById('password_reset').value;
        const passwordConfirm = document.getElementById('password_confirm').value;
        
        if (password !== passwordConfirm) {
            showAlert('error', 'Peringatan', 'Kata sandi dan Konfirmasi kata sandi tidak cocok!');
            return;
        }

        btnSubmit.innerText = "Menyimpan...";
        btnSubmit.disabled = true;

        const payload = {
            email: document.getElementById('email_reset').value,
            otp: document.getElementById('kode_verifikasi').value, 
            password: password,
            password_confirmation: passwordConfirm
        };

        try {
            const response = await fetch(`${BASE_URL}/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            if(response.status === 200 || data.success) {
                showAlert('success', 'Berhasil', 'Kata sandi berhasil diatur ulang! Silakan login', () => {
                    window.location.href = "masuk.html"; 
                });
            } else {
                showAlert('error', 'Gagal', data.message || "Kode OTP salah atau sudah kadaluarsa");
            }
        } catch (error) {
            showAlert('error', 'Koneksi Gagal', 'Tidak dapat terhubung ke server');
        } finally {
            btnSubmit.innerText = "Simpan";
            btnSubmit.disabled = false;
        }
    });
  </script>
</body>
</html>
