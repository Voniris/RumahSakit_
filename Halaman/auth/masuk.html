<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Masuk - Rumah Sakit</title>
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="form-side">
        <div class="logo">
          <img src="../../assets/logo/Logors.png" alt="Logo" width="40" />
          <span class="logo-name"
            >Rumah Sakit<br /><small>Viamedika</small></span
          >
        </div>
        <h1>Masuk</h1>

        <div class="roles-toggle">
          <button
            type="button"
            class="btn-roles active"
            id="btnPasien"
            onclick="setRoles('pasien')"
          >
            Pasien
          </button>
          <button
            type="button"
            class="btn-roles"
            id="btnPetugas"
            onclick="setRoles('petugas')"
          >
            Petugas
          </button>
        </div>

        <input type="hidden" id="selectedRoles" value="pasien" />

        <form id="formLogin">
          <div class="form-group">
            <label>Alamat Email / NIK</label>
            <input
              type="email"
              id="email"
              placeholder="Masukkan Email atau NIK Anda"
              required
              autocomplete="off"
            />
          </div>

          <div class="form-group password-group">
            <label>Kata Sandi</label>
            <input
              type="password"
              id="password"
              placeholder="Masukkan Kata Sandi"
              required
              autocomplete="new-password"
            />
            <span
              class="toggle-password"
              onclick="togglePassword('password', this)"
            >
              <img src="../../assets/icons/closedeyes.png" width="20" />
            </span>
          </div>
          <br />
          <div class="remember-row">
            <label
              ><input type="checkbox" id="remember_me" /> Ingatlah selama 7
              hari</label
            >
            <a href="reset_password.html" style="margin-top: -50px"
              >Lupa Kata Sandi</a
            >
          </div>
          <br />
          <button type="submit" class="btn-primary" id="btnSubmitLogin">
            Masuk
          </button>
          <br />
          <br />
          <p class="redirect">
            Belum punya akun? <a href="daftar.html">Daftar</a>
          </p>
        </form>
      </div>

      <div class="image-side">
        <img src="../../assets/images/Hospital.png" />
      </div>
    </div>

    <script src="../../js/main.js"></script>

    <script>
      function setRoles(roles) {
        document.getElementById("selectedRoles").value = roles;
        document
          .getElementById("btnPasien")
          .classList.toggle("active", roles === "pasien");
        document
          .getElementById("btnPetugas")
          .classList.toggle("active", roles === "petugas");
      }

      document
        .getElementById("formLogin")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const btnSubmit = document.getElementById("btnSubmitLogin");
          btnSubmit.innerText = "Memeriksa...";
          btnSubmit.disabled = true;

          const tombolAktif = document.getElementById("selectedRoles").value;

          const payload = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            remember_me: document.getElementById("remember_me").checked,
          };

          try {
            const response = await fetch(
              "http://kelompok1-rs.test/api/auth/login",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Accept: "application/json",
                },
                body: JSON.stringify(payload),
              },
            );

            const result = await response.json();
            if (response.ok || result.success) {
              localStorage.setItem("rs_token", result.data.token);
              const userRoles = result.data.user.roles;

              console.log("DEBUG - Tombol Aktif:", tombolAktif);
              console.log("DEBUG - User Roles:", userRoles);
              console.log(
                "DEBUG - Roles Type:",
                Array.isArray(userRoles) ? "Array" : typeof userRoles,
              );
              console.log("DEBUG - Roles Detail:", JSON.stringify(userRoles));

              showAlert("success", "Login Berhasil!", "Selamat datang.", () => {
                if (tombolAktif === "pasien") {
                  if (userRoles.includes("pasien")) {
                    window.location.href = "../pasien/dashboard_pasien.html";
                  } else {
                    showAlert(
                      "error",
                      "Akses Ditolak",
                      "Akun Anda tidak terdaftar sebagai Pasien.",
                    );
                    localStorage.removeItem("rs_token");
                  }
                } else if (tombolAktif === "petugas") {
                  console.log(
                    "DEBUG - Check Superadmin:",
                    userRoles.includes("superadmin"),
                  );
                  console.log(
                    "DEBUG - Check Admin Perawat:",
                    userRoles.includes("admin_perawat"),
                  );
                  if (userRoles.includes("superadmin")) {
                    window.location.href =
                      "../super_admin/dashboard_superadmin.html";
                  } else if (
                    userRoles.includes("admin_perawat") ||
                    userRoles.includes("petugas") ||
                    userRoles.includes("perawat") ||
                    userRoles.includes("dokter")
                  ) {
                    window.location.href = "../petugas/dashboard_petugas.html";
                  } else {
                    showAlert(
                      "error",
                      "Akses Ditolak",
                      "Anda tidak memiliki otoritas akses Petugas/Admin",
                    );
                    localStorage.removeItem("rs_token");
                  }
                }
              });
            } else {
              showAlert(
                "error",
                "Login Gagal",
                result.message || "Email atau Password salah",
              );
            }
          } catch (error) {
            console.error(error);
            showAlert(
              "error",
              "Koneksi Gagal",
              "Tidak dapat terhubung ke server Backend.",
            );
          } finally {
            btnSubmit.innerText = "Masuk";
            btnSubmit.disabled = false;
          }
        });
    </script>
  </body>
</html>
