<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Pasien Lama - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../css/formpasien.css" />
</head>
<body>

  <div class="logo-container">
    <img src="../../../assets/logo/logoputih.png" alt="Logo Viamedika" onerror="this.style.display='none'">
  </div>

  <div class="form-card">

    <div class="stepper-wrapper">
      <div class="step done">
        <div class="circle">1</div>
        <p>Memilih Jenis Pasien</p>
      </div>
      <div class="step active">
        <div class="circle">2</div>
        <p>Mengisi Form<br>Pasien Lama</p>
      </div>
      <div class="step pending">
        <div class="circle">3</div>
        <p>Cetak Nomor<br>Antrian</p>
      </div>
    </div>

    <form id="formPasienLama" onsubmit="return false;">

      <div class="form-group">
        <label>Nomor Induk Kependudukan (NIK) <span>*</span></label>
        <div class="input-wrapper">
          <img src="../../../assets/icons/nmalngkp.png" alt="NIK" class="icon-left" style="width:18px; height:18px; margin-left:4px;">
          <input type="text" id="nik" class="form-control pad-left" placeholder="Memuat NIK..." maxlength="16" readonly required/>
        </div>
      </div>

      <div class="form-group">
        <label>Nama Lengkap <span>*</span></label>
        <div class="input-wrapper">
          <img src="../../../assets/icons/nmalngkp.png" alt="Nama" class="icon-left" style="width:18px; height:18px; margin-left:4px;">
          <input type="text" id="nama_lengkap" class="form-control pad-left" placeholder="Memuat nama..." readonly required/>
        </div>
      </div>

      <div class="form-group">
        <label>Nomor Rekam Medis <span>*</span></label>
        <div class="input-wrapper">
          <img src="../../../assets/icons/rekammedis.png" alt="RM" class="icon-left" style="width:18px; height:18px; margin-left:4px;">
          <input type="text" id="nomor_rm" class="form-control pad-left" placeholder="Memuat nomor RM..." readonly required/>
        </div>
      </div>

      <div class="form-group">
        <label>Pilih Unit <span>*</span></label>
        <div class="input-wrapper">
          <select id="unit_id" name="unit_id" class="form-control pad-right" required>
            <option value="" disabled selected hidden>Memuat unit...</option>
          </select>
          <svg class="icon-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
      </div>

      <div id="errorMsg" style="display:none;background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;"></div>

      <div class="action-buttons">
        <button type="button" class="btn" onclick="window.location.href='../dashboard_pasien.html'">Kembali</button>
        <button type="button" class="btn" id="btnSelanjutnya" onclick="submitPendaftaranLama()">Selanjutnya</button>
      </div>

    </form>
  </div>

  <script>
    const BASE_URL    = 'http://kelompok1-rs.test/api';
    const UNITS_URL   = `${BASE_URL}/units`;
    const DAFTAR_URL  = `${BASE_URL}/pendaftaran/online`;
    const PROFIL_URL  = `${BASE_URL}/pasien/profil`;

    function authHeaders() {
      const token = localStorage.getItem('rs_token');
      const headers = {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      };
      if (token) {
        const cleanToken = token.trim().replace(/^"|"$/g, '');
        headers['Authorization'] = `Bearer ${cleanToken}`;
      }
      return headers;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    // 1. Fetch units dari API
    async function loadUnits() {
      const select = document.getElementById('unit_id');
      try {
        const res  = await fetch(UNITS_URL);
        const json = await res.json();

        select.innerHTML = '<option value="" disabled selected hidden>Pilih Unit</option>';
        json.data.forEach(unit => {
          const opt   = document.createElement('option');
          opt.value   = unit.id;
          opt.textContent = unit.nama_unit;
          opt.style.color = '#333';
          select.appendChild(opt);
        });
      } catch (err) {
        select.innerHTML = '<option value="" disabled selected hidden>Gagal memuat unit</option>';
        showError('Gagal memuat daftar unit. Periksa koneksi internet Anda.');
      }
    }

    // 2. FUNGSI BARU: Otomatis memuat profil pasien (NIK, Nama, RM) saat halaman dibuka
    async function loadPasienProfil() {
      try {
        const res = await fetch(PROFIL_URL, { headers: authHeaders() });
        
        if (!res.ok) {
          throw new Error(`HTTP error! status: ${res.status}`);
        }
        
        const data = await res.json();
        console.log("Data Profil Terdeteksi:", data);
          
        if (data.terdaftar && data.data) {
            const p = data.data;
            // Otomatis isi ketiga field sekaligus!
            document.getElementById('nik').value = p.nik || '';
            document.getElementById('nama_lengkap').value = p.nama_lengkap || '';
            document.getElementById('nomor_rm').value = p.nomor_rm || '';
        } else {
            showError('Data profil Anda tidak ditemukan. Pastikan Anda sudah terdaftar sebagai pasien lama.');
            setPlaceholders('Data tidak ditemukan');
        }
      } catch (error) {
        console.error("Gagal memuat data pasien:", error);
        showError('Gagal mengambil data profil dari server. Pastikan Anda sudah login.');
        setPlaceholders('Gagal memuat data');
      }
    }

    // Fungsi pembantu untuk mengubah teks placeholder jika gagal load
    function setPlaceholders(text) {
      document.getElementById('nik').placeholder = text;
      document.getElementById('nama_lengkap').placeholder = text;
      document.getElementById('nomor_rm').placeholder = text;
    }

    // 3. Submit Pendaftaran ke Backend
    async function submitPendaftaranLama() {
      hideError();

      const nama_lengkap = document.getElementById('nama_lengkap').value.trim();
      const nik          = document.getElementById('nik').value.trim();
      const nomor_rm     = document.getElementById('nomor_rm').value.trim();
      const unit_id      = document.getElementById('unit_id').value;

      if (!nama_lengkap || !nik || !nomor_rm || !unit_id) {
        showError('Harap lengkapi semua field (Nama, NIK, No. RM, Unit) sebelum melanjutkan.');
        return;
      }

      const payload = {
        nik,
        nama_lengkap,
        nomor_rm,
        unit_id: parseInt(unit_id),
      };

      const btn = document.getElementById('btnSelanjutnya');
      btn.disabled    = true;
      btn.textContent = 'Memproses...';

      try {
        const res = await fetch(DAFTAR_URL, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(payload),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const msg = data.message || data.error || `Terjadi kesalahan (HTTP ${res.status})`;
          showError(msg);
          return;
        }

        if (data.data) {
          localStorage.setItem('antrian_lama', JSON.stringify(data.data));
        }

        window.location.href = 'cetak_antrian_lama.html';

      } catch (err) {
        showError('Gagal terhubung ke server. Pastikan Backend sudah jalan.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Selanjutnya';
      }
    }

    // JALANKAN SEMUA FUNGSI SAAT HALAMAN DI-LOAD
    window.addEventListener('DOMContentLoaded', () => {
      loadUnits();        // Muat dropdown poliklinik
      loadPasienProfil(); // Muat otomatis NIK, Nama, dan No. RM
    });
  </script>

</body>
</html>
