<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pembuatan Tiket - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/pendaftaran.css" />
</head>
<body>

  <div class="dashboard-container">
    
    <aside class="sidebar-dashboard">
      <div class="sidebar-logo">
        <img src="../../assets/logo/Logors.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3063/3063206.png'" />
        <span>Rumah Sakit<br><small>Viamedika</small></span>
      </div>

      <a href="dashboard_pasien.html" class="menu-item">
        <img src="../../assets/icons/beranda.png" alt="Home" width="25">
        <span>Dashboard</span>
      </a>

      <a href="pendaftaran_pasien.html" class="menu-item active">
        <img src="../../assets/icons/pendaftaran.png" alt="Daftar" width="16">
        <span>Pendaftaran</span>
      </a>

      <a href="lihat_antrian.html" class="menu-item">
        <img src="../../assets/icons/panggill.png" alt="Antrian" width="20">
        <span>Lihat Antrian</span>
      </a>
    </aside>

    <main class="main-content">
      
      <div class="top-profile" onclick="toggleProfile()">
        <div class="info-user">
          <span class="role">Pasien</span>
          <span class="name" id="profileName">Memuat...</span>
        </div>
        <img id="headerAvatar" src="https://ui-avatars.com/api/?name=Pasien&background=005461&color=fff" alt="Profile">

        <div class="profile-popup" id="profilePopup">
            <span class="close-popup" onclick="toggleProfile(); event.stopPropagation();">&times;</span>
            <img id="popupAvatar" src="https://ui-avatars.com/api/?name=Pasien&background=005461&color=fff" class="img-large" alt="Profile">
            <h4 id="popupName">Memuat...</h4>
            <p class="popup-role">Pasien</p>
            <div class="popup-btns">
                <button class="btn-logout" onclick="logout(event)">Keluar</button>
            </div>
        </div>
      </div>

      <h1 class="page-title">Pembuatan Tiket</h1>

      <div class="center-wrapper">
        <div class="ticket-card">
          
          <img src="../../assets/images/dokterpendaftarannew.png" alt="Dokter Mikir" class="doctor-ticket-img" onerror="this.style.display='none'">
          
          <div class="ticket-content">
            <h2>Pilih Jenis Pasien</h2>
            <p>Silakan pilih salah satu jenis pasien dibawah ini</p>
            
            <div class="custom-dropdown">
              <button class="btn-dropdown-header" onclick="toggleDropdown()">
                Pilih Jenis Pasien
                <svg id="dropdown-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              
              <div class="dropdown-options" id="dropdownMenu">
                <button class="btn-option" onclick="window.location.href='pasien_baru/form_pasien_baru.html'">
                  Pasien Baru
                </button>
                <button class="btn-option" onclick="window.location.href='pasien_lama/form_pasien_lama.html'">
                  Pasien Lama
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="../../js/auth.js"></script>
  
  <script>
    const BASE_URL = 'https://daftar4b06.vps-poliban.my.id/api';

    (async function initProfile() {
        const token = localStorage.getItem('rs_token');
        
        if (!token) {
             window.location.href = '../auth/masuk.html';
            return;
        }

        try {
            const response = await fetch(`${BASE_URL}/auth/me`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`, 
                    'Accept': 'application/json'
                }
            });

            const result = await response.json();

           if (response.ok) {
                let namaFinal = result?.data?.name || result?.name || result?.data?.user?.name || result?.user?.name;

                if (!namaFinal || namaFinal.trim() === "") {
                    const emailUser = result?.data?.user?.email || result?.user?.email || result?.data?.email || result?.email;
                    if (emailUser) {
                        namaFinal = emailUser;
                    }
                }

                if (!namaFinal || namaFinal.trim() === "") namaFinal = "Pasien";
                document.getElementById('profileName').innerText = namaFinal;
                document.getElementById('popupName').innerText = namaFinal;
                
    
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(namaFinal)}&background=005461&color=fff`;
                document.getElementById('headerAvatar').src = avatarUrl;
                document.getElementById('popupAvatar').src = avatarUrl;

            } else {
                localStorage.removeItem('rs_token');
                window.location.href = '../auth/masuk.html';
            }
        } catch (error) {
            console.error("Gagal memuat profil:", error);
            document.getElementById('profileName').innerText = "Pasien (Offline)";
            document.getElementById('popupName').innerText = "Pasien (Offline)";
        }
    })();

    function toggleDropdown() {
      const menu = document.getElementById("dropdownMenu");
      const icon = document.getElementById("dropdown-icon");
      
      menu.classList.toggle("show");
      icon.classList.toggle("rotate-icon");
    }

    function toggleProfile() {
      const popup = document.getElementById('profilePopup');
      popup.classList.toggle('show');
    }

    window.addEventListener('click', function(event) {
      if (!event.target.closest('.top-profile') && !event.target.closest('.custom-dropdown')) {
        const popupProfile = document.getElementById('profilePopup');
        if (popupProfile && popupProfile.classList.contains('show')) {
          popupProfile.classList.remove('show');
        }

        const dropdownMenu = document.getElementById('dropdownMenu');
        const dropdownIcon = document.getElementById('dropdown-icon');
        if (dropdownMenu && dropdownMenu.classList.contains('show')) {
          dropdownMenu.classList.remove('show');
          if (dropdownIcon) dropdownIcon.classList.remove('rotate-icon');
        }
      }
    });

    function logout(event) {
        event.stopPropagation();
        localStorage.removeItem('rs_token');
        window.location.href = '../auth/masuk.html';
    }
  </script>
</body>
</html>
