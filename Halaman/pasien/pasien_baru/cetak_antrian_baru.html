<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cetak Nomor Antrian Pasien Baru - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="../../../css/cetakkartubaru.css" />
</head>
<body>

  <div class="header-logo">
    <img src="../../../assets/logo/Logors.png" alt="Logo" />
    <span>Rumah Sakit<br><small>Viamedika</small></span>
  </div>

  <div class="content-wrapper">
    <h2 class="page-title">Tiket Antrian</h2>

    <div class="ticket-card" id="areaTiket">
      <p class="tc-title">Nomor Antrian</p>
      <h1 class="tc-number" id="teksNomorAntrian">A-001</h1>
      
      <p class="tc-title">Jadwal Antrian</p>
      <p class="tc-grey" id="teksJadwal">Senin, 27 April 2026<br>Pukul 10.00</p>
      
      <p class="tc-title" id="teksUnit">Unit</p>
      <p class="tc-title" style="margin-top: 5px;" id="teksSisaAntrian">Ada 0 Antrian Didepan</p>
      <p class="tc-grey" style="margin-top: 4px;" id="teksEstimasi">Estimasi Dipanggil: --:--</p>
      <p class="tc-title" style="margin-top: 15px;">-Terima Kasih-</p>
    </div>

    <div class="action-buttons">
      <button type="button" class="btn-cetak" onclick="simpanKePNG()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        Cetak Nomor Antrian
      </button>
      <button type="button" class="btn-kembali" onclick="window.location.href='../dashboard_pasien.html'">
        Kembali Ke Halaman Utama
      </button>
    </div>
  </div>

  <div class="footer-wrapper">
    <img src="../../../assets/images/omkedok.png" alt="Dokter 3D" class="doctor-img" />
    <div class="footer-banner">
      Silakan Datang Sesuai dengan Jadwal yang diberikan untuk menghindari keterlambatan
    </div>
  </div>


  <script src="../../js/auth.js"></script>
  <script>
    const BASE_URL = 'https://kelompok1-rs.test/api';

    (function checkAuth() {
      const token = localStorage.getItem('rs_token');
      if (!token) {
        window.location.href = '../../auth/masuk.html';
        return;
      }
      fetch(`${BASE_URL}/auth/me`, {
        method: 'GET',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/json'
        }
      }).then(function(res) {
        if (!res.ok) {
          localStorage.removeItem('rs_token');
          localStorage.removeItem('token');
          window.location.href = '../../auth/masuk.html';
        }
      }).catch(function(error) {
        console.error("Gagal validasi token:", error);
      });
    })();
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const dataAntrian = JSON.parse(localStorage.getItem("pendaftaran"));

      if (dataAntrian) {
        const tiket = dataAntrian.tiket;

        document.getElementById("teksNomorAntrian").innerText = tiket.kode_antrian ?? "A-001";
        document.getElementById("teksUnit").innerText = tiket.unit ?? "Unit";
        document.getElementById("teksSisaAntrian").innerText =`Ada ${tiket.antrian_di_depan ?? 0} Antrian Didepan`;
        document.getElementById("teksEstimasi").innerText =`Estimasi Dipanggil: ${tiket.estimasi?.perkiraan_jam ?? "--:--"}`;
        const tgl = tiket.tanggal ? new Date(tiket.tanggal + "T00:00:00") : new Date();
        const namaHari  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
        const namaBulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli',
                           'Agustus','September','Oktober','November','Desember'];

        document.getElementById("teksJadwal").innerHTML =
          `${namaHari[tgl.getDay()]}, ${tgl.getDate()} ${namaBulan[tgl.getMonth()]} ${tgl.getFullYear()}<br>Estimasi Pukul ${tiket.estimasi?.perkiraan_jam ?? "--:--"}`;
      }
    });

    function simpanKePNG() {
      const element = document.getElementById("areaTiket");
      const judul = document.querySelector(".page-title");
      
      const wrapper = document.createElement("div");
      wrapper.style.padding = "20px";
      wrapper.style.backgroundColor = "white";
      wrapper.style.display = "flex";
      wrapper.style.flexDirection = "column";
      wrapper.style.alignItems = "center";
      
      const judulClone = judul.cloneNode(true);
      judulClone.style.marginTop = "0";
      
      wrapper.appendChild(judulClone);
      wrapper.appendChild(element.cloneNode(true));
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        backgroundColor: "#ffffff",
        scale: 2
      }).then(canvas => {
        const link = document.createElement("a");
        link.download = "Antrian-Baru-Viamedika.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
        document.body.removeChild(wrapper);
      });
    }
  </script>
</body>
</html>
