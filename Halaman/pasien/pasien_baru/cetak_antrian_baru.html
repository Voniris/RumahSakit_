<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cetak Nomor Antrian Pasien Baru - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="../../../css/cetakkartubaru.css" />
</head>
<body>

  <div class="header-logo">
    <img src="../../../assets/logo/Logors.png" alt="Logo" />
    <span>Rumah Sakit<br><small>Viamedika</small></span>
  </div>

  <div class="content-wrapper">
    <h2 class="page-title">Tiket Antrian</h2>

    <div class="ticket-card" id="areaTiket">
      <p class="tc-title">Nomor Antrian</p>
      <h1 class="tc-number" id="teksNomorAntrian">A-001</h1>
      
      <p class="tc-title">Jadwal Antrian</p>
      <p class="tc-grey" id="teksJadwal">Senin, 27 April 2026<br>Pukul 10.00</p>
      
     <p class="tc-title" style="margin-top: 5px;" id="teksSisaAntrian">Ada 0 Antrian Didepan</p>
<p class="tc-grey" style="margin-top: 4px;" id="teksEstimasi">Estimasi Dipanggil: --:--</p>  <!-- ← tambah ini -->
<p class="tc-title" style="margin-top: 15px;">-Terima Kasih-</p>
    </div>

    <div class="action-buttons">
      <button type="button" class="btn-cetak" onclick="simpanKePNG()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        Cetak Nomor Antrian
      </button>
      <button type="button" class="btn-kembali" onclick="window.location.href='../dashboard_pasien.html'">
        Kembali Ke Halaman Utama
      </button>
    </div>
  </div>

  <div class="footer-wrapper">
    <img src="../../../assets/images/omkedok.png" alt="Dokter 3D" class="doctor-img" />
    <div class="footer-banner">
      Silakan Datang Sesuai dengan Jadwal yang diberikan untuk menghindari keterlambatan
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
  // ==========================================
  // 1. AMBIL DATA API DARI FORM SEBELUMNYA
  // ==========================================
  const dataAntrian = JSON.parse(localStorage.getItem("pendaftaran"));

  if (dataAntrian) {
    const tiket = dataAntrian.tiket;

    // Nomor Antrian
    if (tiket?.kode_antrian) {
      document.getElementById("teksNomorAntrian").innerText = tiket.kode_antrian;
    }

    // Nama Unit
    if (tiket?.unit) {
      document.getElementById("teksUnit").innerText = tiket.unit;
    }

    // Antrian di depan
    const antrianDiDepan = tiket?.antrian_di_depan ?? 0;
    document.getElementById("teksSisaAntrian").innerText = `Ada ${antrianDiDepan} Antrian Didepan`;

    // ==========================================
    // 2. WAKTU DAFTAR DARI created_at
    // ==========================================
    const createdAt = dataAntrian.tiket?.created_at
      ? new Date(dataAntrian.tiket.created_at)
      : new Date(); // fallback ke sekarang kalau tidak ada

    const namaHari   = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const namaBulan  = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

    const hari    = namaHari[createdAt.getDay()];
    const tanggal = createdAt.getDate();
    const bulan   = namaBulan[createdAt.getMonth()];
    const tahun   = createdAt.getFullYear();
    const jam     = String(createdAt.getHours()).padStart(2, '0');
    const menit   = String(createdAt.getMinutes()).padStart(2, '0');

    document.getElementById("teksJadwal").innerHTML =
      `${hari}, ${tanggal} ${bulan} ${tahun}<br>Pukul ${jam}.${menit}`;

    // ==========================================
    // 3. ESTIMASI WAKTU = antrian_di_depan x 5 menit
    // ==========================================
    const estimasiMenit = antrianDiDepan * 5;
    const waktuEstimasi = new Date(createdAt.getTime() + estimasiMenit * 60000);

    const jamEst   = String(waktuEstimasi.getHours()).padStart(2, '0');
    const menitEst = String(waktuEstimasi.getMinutes()).padStart(2, '0');

    // Tampilkan estimasi di bawah sisa antrian
    // Pastikan ada elemen <p id="teksEstimasi"> di HTML-mu
    const elEst = document.getElementById("teksEstimasi");
    if (elEst) {
      elEst.innerText = `Estimasi Dipanggil: ${jamEst}.${menitEst}`;
    }
  }
});
  </script>
</body>
</html>
