<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cetak Nomor Antrian Pasien Baru - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="../../../css/cetakkartubaru.css" />
</head>
<body>

  <div class="header-logo">
    <img src="../../../assets/logo/Logors.png" alt="Logo" />
    <span>Rumah Sakit<br><small>Viamedika</small></span>
  </div>

  <div class="content-wrapper">
    <h2 class="page-title">Tiket Antrian</h2>

    <div class="ticket-card" id="areaTiket">
      <p class="tc-title">Nomor Antrian</p>
      <h1 class="tc-number" id="teksNomorAntrian">A-001</h1>
      
      <p class="tc-title">Jadwal Antrian</p>
      <p class="tc-grey" id="teksJadwal">Senin, 27 April 2026<br>Pukul 10.00</p>
      
      <p class="tc-title" id="teksUnit">Pilih Unit</p>
      <p class="tc-title" style="margin-top: 5px;" id="teksSisaAntrian">Ada 0 Antrian Didepan</p>
      <p class="tc-title" style="margin-top: 15px;">-Terima Kasih-</p>
    </div>

    <div class="action-buttons">
      <button type="button" class="btn-cetak" onclick="simpanKePNG()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        Cetak Nomor Antrian
      </button>
      <button type="button" class="btn-kembali" onclick="window.location.href='../dashboard_pasien.html'">
        Kembali Ke Halaman Utama
      </button>
    </div>
  </div>

  <div class="footer-wrapper">
    <img src="../../../assets/images/omkedok.png" alt="Dokter 3D" class="doctor-img" />
    <div class="footer-banner">
      Silakan Datang Sesuai dengan Jadwal yang diberikan untuk menghindari keterlambatan
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // ==========================================
      // 1. BIKIN TANGGAL & JAM OTOMATIS SAAT INI
      // ==========================================
      const waktuSekarang = new Date();
      const namaHari = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const namaBulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      
      const hari = namaHari[waktuSekarang.getDay()];
      const tanggal = waktuSekarang.getDate();
      const bulan = namaBulan[waktuSekarang.getMonth()];
      const tahun = waktuSekarang.getFullYear();
      
      const jam = String(waktuSekarang.getHours()).padStart(2, '0');
      const menit = String(waktuSekarang.getMinutes()).padStart(2, '0');
      
      // Tembakkan waktu ke HTML
      document.getElementById("teksJadwal").innerHTML = `${hari}, ${tanggal} ${bulan} ${tahun}<br>Pukul ${jam}.${menit}`;

      // ==========================================
      // 2. AMBIL DATA API DARI FORM SEBELUMNYA
      // ==========================================
      // Mengambil data pendaftaran yang kita simpan di localStorage sebelumnya
      const dataAntrian = JSON.parse(localStorage.getItem("pendaftaran"));

      if (dataAntrian) {
        // Ganti Nomor Antrian sesuai dari Backend
        if (dataAntrian.no_antrian) {
          document.getElementById("teksNomorAntrian").innerText = dataAntrian.no_antrian;
        }
        
        // Ganti Nama Poli/Unit sesuai yang dipilih
        if (dataAntrian.nama_poli) {
          document.getElementById("teksUnit").innerText = dataAntrian.nama_poli;
        } else if (dataAntrian.unit_id) {
          // Kalau backend cuma ngirim ID, kita terjemahin ke nama polinya
          const listPoli = { 1: "Poli Mata", 2: "Poli Gigi", 3: "Poli Penyakit Dalam", 6: "Poli KIA (Ibu & Anak)", 7: "Poli Anak" };
          document.getElementById("teksUnit").innerText = listPoli[dataAntrian.unit_id] || "Poli Umum";
        }

        // Kalau backend mengirimkan info sisa antrian di depan kita
        if (dataAntrian.sisa_antrian !== undefined) {
          document.getElementById("teksSisaAntrian").innerText = `Ada ${dataAntrian.sisa_antrian} Antrian Didepan`;
        }
      }
    });

    // ==========================================
    // 3. FUNGSI SIMPAN JADI PNG
    // ==========================================
    function simpanKePNG() {
      const element = document.getElementById("areaTiket");
      const judul = document.querySelector(".page-title");
      
      const wrapper = document.createElement("div");
      wrapper.style.padding = "20px";
      wrapper.style.backgroundColor = "white";
      wrapper.style.display = "flex";
      wrapper.style.flexDirection = "column";
      wrapper.style.alignItems = "center";
      
      const judulClone = judul.cloneNode(true);
      judulClone.style.marginTop = "0"; 
      
      wrapper.appendChild(judulClone);
      wrapper.appendChild(element.cloneNode(true));
      
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        backgroundColor: "#ffffff",
        scale: 2 
      }).then(canvas => {
        const link = document.createElement("a");
        link.download = "Antrian-Baru-Viamedika.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
        
        document.body.removeChild(wrapper);
      });
    }
  </script>
</body>
</html>
