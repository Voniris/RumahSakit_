<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Pasien Baru - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../css/formpasien.css" />

</head>
<body>

  <div class="logo-container">
    <img src="../../../assets/logo/logoputih.png" alt="Logo Viamedika" onerror="this.style.display='none'">
  </div>

  <div class="form-card">

    <div class="stepper-wrapper">
      <div class="step done">
        <div class="circle">1</div>
        <p>Memilih Jenis Pasien</p>
      </div>
      <div class="step active">
        <div class="circle">2</div>
        <p>Mengisi Form<br>Pendaftaran Pasien Baru</p>
      </div>
      <div class="step pending">
        <div class="circle">3</div>
        <p>Pengambilan Kartu<br>Rekam Medis</p>
      </div>
    </div>

    <form id="formPasien" onsubmit="return false;">

      <div class="form-group">
        <label>Nomor Induk Kependudukan (NIK)</label>
        <div class="input-wrapper">
          <img src="../../../assets/icons/nmalngkp.png" alt="NIK" class="icon-left" style="width:18px; height:18px; margin-left:4px;">
          <input type="text" id="nik" class="form-control pad-left" placeholder="Masukkan NIK" maxlength="16"/>
        </div>
      </div>

      <div class="form-group">
        <label>Nama Lengkap</label>
        <div class="input-wrapper">
          <img src="../../../assets/icons/nmalngkp.png" alt="Nama" class="icon-left" style="width:18px; height:18px; margin-left:4px;">
          <input type="text" id="nama_lengkap" class="form-control pad-left" placeholder="Masukkan Nama Lengkap"/>
        </div>
      </div>

      <div class="input-group">
    <label>Tanggal Lahir <span>*</span></label>
    <div class="input-wrapper">
        <input type="date" id="tanggal_lahir" name="tanggal_lahir" class="form-control no-icon-left" required>
    </div>
</div>

      <div class="form-group">
        <label>Alamat</label>
        <div class="input-wrapper">
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          <input type="text" id="alamat" class="form-control pad-left" placeholder="Masukkan Alamat Lengkap"/>
        </div>
      </div>

      <div class="form-group">
        <label>Jenis Kelamin</label>
        <div class="input-wrapper">
          <select id="jenis_kelamin" class="form-control pad-right">
            <option value="" disabled selected>Pilih Jenis Kelamin</option>
            <option value="L">Laki-laki</option>
            <option value="P">Perempuan</option>
          </select>
          <svg class="icon-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label>Nomor Telepon / WhatsApp</label>
        <div class="input-wrapper">
          <input type="text" id="no_telepon" class="form-control" placeholder="08xxxxxxxxx"/>
        </div>
      </div>

      <div class="form-group">
        <label>Pilih Unit</label>
        <div class="input-wrapper">
          <select id="unit_id" name="unit_id" class="form-control pad-right" required>
            <option value="" disabled selected hidden>Pilih Unit</option>
            <option value="1" style="color:#333;">Poli Mata</option>
            <option value="2" style="color:#333;">Poli Gigi</option>
            <option value="3" style="color:#333;">Poli Penyakit Dalam</option>
            <option value="6" style="color:#333;">Poli KIA (Ibu & Anak)</option>
            <option value="7" style="color:#333;">Poli Anak</option>
          </select>
          <svg class="icon-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
      </div>

      <!-- Error message -->
      <div id="errorMsg" style="display:none;background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;"></div>

      <div class="action-buttons">
        <button type="button" class="btn" onclick="window.location.href='../dashboard_pasien.html'">Kembali</button>
        <button type="button" class="btn" id="btnSelanjutnya" onclick="submitPendaftaran()">Selanjutnya</button>
      </div>

    </form>
  </div>

  <script>
    // ── CONFIG ──
    const BASE_URL = 'http://localhost:8000/api/pendaftaran'; // Ganti sesuai base URL backend, misal: 'https://api.vamedika.id/api'

    function authHeaders() {
      const token = localStorage.getItem('token') || '';
      return {
        'Content-Type': 'application/json',
        ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
      };
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    async function submitPendaftaran() {
      hideError();

      // Ambil nilai field
      const nik           = document.getElementById('nik').value.trim();
      const nama_lengkap  = document.getElementById('nama_lengkap').value.trim();
      const tanggal_lahir = document.getElementById('tanggal_lahir').value;
      const alamat        = document.getElementById('alamat').value.trim();
      const jenis_kelamin = document.getElementById('jenis_kelamin').value;
      const no_telepon    = document.getElementById('no_telepon').value.trim();
      const unit_id       = document.getElementById('unit_id').value;

      // Validasi sederhana
      if (!nik || !nama_lengkap || !tanggal_lahir || !alamat || !jenis_kelamin || !no_telepon || !unit_id) {
        showError('Harap lengkapi semua field sebelum melanjutkan.');
        return;
      }

      // Payload — sesuaikan key dengan yang diharapkan API
      const payload = {
        nik,
        nama_lengkap,
        tanggal_lahir,
        alamat,
        jenis_kelamin,
        no_telepon,
        unit_id: parseInt(unit_id),
      };

      const btn = document.getElementById('btnSelanjutnya');
      btn.disabled    = true;
      btn.textContent = 'Memproses...';

      try {
        const res = await fetch(`${BASE_URL}/pendaftaran`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(payload),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          // Tampilkan pesan error dari server jika ada
          const msg = data.message || data.error || `Terjadi kesalahan (HTTP ${res.status})`;
          showError(msg);
          return;
        }

        // Simpan data response jika dibutuhkan di halaman berikutnya
        // Misal: no_rm atau id pendaftaran
        if (data.data) {
          localStorage.setItem('pendaftaran', JSON.stringify(data.data));
        }

        // Lanjut ke halaman berikutnya
        window.location.href = 'pengambilan_rm.html';

      } catch (err) {
        showError('Gagal terhubung ke server. Periksa koneksi internet Anda.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Selanjutnya';
      }
    }
  </script>

</body>
</html>
