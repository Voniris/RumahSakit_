<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pendaftaran - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    /* --- CSS CANGKANG (TEMPLATE HOMESCREEN) --- */
    body {
      background-color: #F8F9FA;
      margin: 0;
      font-family: 'Poppins', sans-serif;
    }

    .dashboard-container {
      display: flex;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      gap: 20px;
    }

    /* --- SIDEBAR KIRI --- */
       .sidebar-dashboard {
      background-color: #ffffff;
      width: 295px;
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 70px;
    }

    .sidebar-logo img { width: 40px; }
    .sidebar-logo span {
      font-weight: 0;
      color: #000000;
      font-size: 14px;
      line-height: 1.2;
    }
    .sidebar-logo small { font-weight: 300; }

    .menu-item {
      width: 100%;
      background-color: #ECECEC;
      padding: 12px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      color: #333;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      box-sizing: border-box;
      transition: 0.3s;
    }

    .menu-item:hover{
        background-color: #e2e2e2;
    }
    
    .menu-item.active {
      background-color: #d8dbdb;
    }

    /* --- KONTEN KANAN (MAIN) --- */
    .main-content {
      flex: 1; background-color: #EFEFEF; border-radius: 20px; padding: 30px;
      position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex; flex-direction: column;
    }

    /* Profil Kanan Atas */
    .top-profile {
      position: absolute; top: 30px; right: 30px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; background: rgba(255, 255, 255, 0.5); padding: 5px 15px 5px 5px;
      border-radius: 30px; z-index: 10;
    }
    .top-profile img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .top-profile .info-user { display: flex; flex-direction: column; }
    .top-profile .info-user .role { font-size: 12px; font-weight: 700; color: #333; }
    .top-profile .info-user .name { font-size: 11px; color: #666; }

    /* ======================================================== */
    /* --- AREA TENGAH: CARD PILIH PASIEN (DESAIN ASLI KAMU) --- */
    /* ======================================================== */
    .content-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 50px; /* Biar gak nabrak profil di atas */
    }

    .card-pilih {
      /* Pakai warna gradient persis dari kodingan CSS kamu */
      background: linear-gradient(135deg, #3BC1A8 0%, #1F9E9C 40%, #0C6C74 75%, #084C57 100%);
      border-radius: 20px;
      width: 800px;
      height: 500px;
      display: flex;
      align-items: center;
      position: relative;
      padding: 0 50px;
      box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15);
    }

    /* Dokter di kiri (dibikin keluar dari kotak atas & bawah) */
    .dokter-img {
      position: absolute;
      left: 10px;
      bottom: 0;
      height: 115%; 
      z-index: 1;
    }

    /* Teks & Dropdown di kanan */
    .card-right {
      margin-left: auto; /* Otomatis dorong semua isi ke kanan */
      z-index: 2;
      width: 320px;
      color: white;
    }

    .card-right h2 { font-size: 26px; font-weight: 700; margin: 0 0 8px 0; }
    .card-right p { font-size: 14px; opacity: 0.9; margin: 0 0 25px 0; }

    /* --- DROPDOWN CUSTOM PUTIH --- */
    .custom-dropdown {
      position: relative; width: 100%; font-family: 'Poppins', sans-serif;
    }

    .dropdown-trigger {
      padding: 14px 20px;
      border-radius: 30px;
      background-color: #ffffff;
      color: #0E6B63;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    /* Panah segitiga otomatis dari CSS murni (Biar aman gak perlu file gambar) */
    .dropdown-trigger::after {
      content: '▼';
      font-size: 18px;
      color: #0E6B63;
    }

    /* Kotak Pilihan */
    .dropdown-options {
      position: absolute; top: 110%; left: 0; width: 100%;
      background-color: transparent; display: none; z-index: 10;
    }
    .dropdown-options.show { display: block; }

    .option-item {
      padding: 14px 20px; font-size: 14px; font-weight: 600; color: #ffffff;
      background-color: #005461; border-radius: 20px; margin-top: 10px;
      cursor: pointer; transition: all 0.3s ease;
    }
    .option-item:hover { background-color: #014550; }


    /* --- POP UP PROFIL HOMESCREEN --- */
    .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .profile-popup-card { background-color: #ffffff; border-radius: 20px; width: 300px; padding: 20px; position: relative; text-align: center; }
    .btn-close-popup { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 18px; cursor: pointer; color: #666;}
    .popup-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
    .popup-name { color: #0E6B63; font-size: 18px; font-weight: 600; margin: 0; }
    .popup-role { color: #0E6B63; font-size: 12px; font-weight: 500; margin-bottom: 20px; }
    .popup-actions { display: flex; gap: 10px; }
    .btn-edit-profil, .btn-keluar { flex: 1; padding: 8px 0; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500;}
    .btn-edit-profil { background-color: #ffffff; border: 1px solid #ccc; color: #333; }
    .btn-keluar { background-color: #D32F2F; border: none; color: #ffffff; }
  </style>
</head>
<body>

  <div class="dashboard-container">
    
    <!-- 1. SIDEBAR KIRI -->
    <aside class="sidebar-dashboard">
      <div class="sidebar-logo">
        <img src="../../assets/logo/Logors.png" alt="Logo" />
        <span>Rumah Sakit<br><small>Viamedika</small></span>
      </div>

      <!-- Link balik ke Homescreen -->
      <a href="homescreen.html" class="menu-item">
        <img src="../../assets/icons/beranda.png" alt="Home" width="27">
        <span>Dashboard</span>
      </a>

      <!-- Menu Pendaftaran (Posisi Nyala/Aktif) -->
      <a href="#" class="menu-item active">
        <img src="../../assets/icons/pendaftaran.png" alt="Daftar" width="20">
        <span>Pendaftaran</span>
      </a>

      <a href="#" class="menu-item">
        <img src="../../assets/icons/panggill.png" alt="Antrian" width="20">
        <span>Lihat Antrian</span>
      </a>
    </aside>

    <!-- 2. KONTEN KANAN -->
    <main class="main-content">
      
      <!-- Header Profil Kanan Atas -->
      <div class="top-profile" onclick="toggleProfilePopup()">
        <img src="../../assets/images/zahra.png" alt="Zahra Kaliope" />
        <div class="info-user">
          <span class="role">Pasien</span>
          <span class="name">Zahra Kaliope</span>
        </div>
      </div>

      <!-- AREA TENGAH: CARD PILIH PASIEN -->
      <div class="content-area">
        <div class="card-pilih">
          
          <!-- Gambar Dokter Kiri -->
          <img src="../../assets/images/dokter.png" alt="Dokter 3D" class="dokter-img" />
          
          <!-- Teks & Dropdown Kanan -->
          <div class="card-right">
            <h2>Pilih Jenis Pasien</h2>
            <p>Silakan pilih salah satu jenis pasien di bawah ini</p>
            
            <div class="custom-dropdown">
              <!-- Tombol Putih -->
              <div class="dropdown-trigger" onclick="toggleDropdown()">
                <span id="dropdown-text">Pilih Jenis Pasien</span>
              </div>
              
              <!-- Pilihan Dropdown -->
              <div class="dropdown-options" id="dropdown-options">
                <div class="option-item" onclick="pilihJenis('baru')">Pasien Baru</div>
                <div class="option-item" onclick="pilihJenis('lama')">Pasien Lama</div>
              </div>
            </div>

          </div>
        </div>
      </div>

    </main>

  </div>

  <!-- 3. POP UP PROFIL -->
  <div id="profilePopupOverlay" class="popup-overlay" style="display: none;">
    <div class="profile-popup-card">
      <button class="btn-close-popup" onclick="toggleProfilePopup()">✖</button>
      <img src="../../assets/images/zahra.png" alt="Zahra Kaliope" class="popup-avatar" />
      <h3 class="popup-name">Zahra Kaliope</h3>
      <p class="popup-role">Pasien</p>
      <div class="popup-actions">
        <button class="btn-edit-profil">✏ Edit Profil</button>
        <button class="btn-keluar" onclick="window.location.href='login.html'">Keluar</button>
      </div>
    </div>
  </div>

  <!-- SCRIPT JS GABUNGAN -->
  <script>
    // 1. Fungsi Pop Up Profil (Dari Homescreen)
    function toggleProfilePopup() {
      const popup = document.getElementById("profilePopupOverlay");
      if (popup.style.display === "none") {
        popup.style.display = "flex";
      } else {
        popup.style.display = "none";
      }
    }

    // 2. Fungsi Buka Tutup Dropdown (Dari Kodingan Kamu)
    function toggleDropdown() {
      const options = document.getElementById("dropdown-options");
      options.classList.toggle("show");
    }

    // 3. Fungsi Pindah Halaman Pas Klik Pilihan
    function pilihJenis(jenis) {
      document.getElementById("dropdown-options").classList.remove("show");
      
      setTimeout(() => {
        if (jenis === 'baru') {
          window.location.href = 'form_pasien_baru.html';
        } else if (jenis === 'lama') {
          window.location.href = 'form_pasien_lama.html';
        }
      }, 150);
    }

    // 4. Otomatis nutup dropdown kalau klik area kosong di luar
    window.onclick = function(event) {
      if (!event.target.matches('.dropdown-trigger') && !event.target.matches('#dropdown-text')) {
        const dropdowns = document.getElementsByClassName("dropdown-options");
        for (let i = 0; i < dropdowns.length; i++) {
          let openDropdown = dropdowns[i];
          if (openDropdown.classList.contains('show')) {
            openDropdown.classList.remove('show');
          }
        }
      }
    }
  </script>

</body>
</html>
