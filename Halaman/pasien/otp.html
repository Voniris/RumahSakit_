<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Verifikasi OTP - Rumah Sakit</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/pasien2.css" />
</head>
<body>

  <div class="dashboard-container">
    <div class="main-content">
      <div class="header-logo">
        <img src="../../assets/logo/logors2.png" alt="Logo Rumah Sakit">
      </div>

      <div class="content-area">
        <div class="form-card">

          <div class="stepper">
            <div class="step done">
                <div class="step-circle">1</div>
                <span>Memilih Jenis Pasien</span>
            </div>
            <div class="step-line"></div>
            <div class="step done">
                <div class="step-circle">2</div>
                <span>Mengisi Form<br>Pendaftaran Pasien Baru</span>
            </div>
            <div class="step-line"></div>
            <div class="step active">
                <div class="step-circle">3</div>
                <span>Verifikasi Kode OTP</span>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="step-circle">4</div>
                <span>Pengambilan Kartu<br>Rekam Medis</span>
            </div>
          </div>

          <div class="otp-container">
            <div class="wa-icon-wrapper">
              <img src="../../assets/icons/whatsapp.png" alt="WhatsApp" width="40" />
            </div>

            <h2>Masukkan Kode OTP</h2>
            <p class="otp-subtitle" id="teksTujuanOTP">To 0881_ _ _ _</p>
            <p class="otp-resend">Tidak Mendapatkan Kode? <a href="#">Kirim Ulang</a></p>

            <div class="otp-inputs">
              <input type="text" maxlength="1" class="otp-box">
              <input type="text" maxlength="1" class="otp-box">
              <input type="text" maxlength="1" class="otp-box">
              <input type="text" maxlength="1" class="otp-box">
              <input type="text" maxlength="1" class="otp-box">
              <input type="text" maxlength="1" class="otp-box">
            </div>

            <button class="btn-verifikasi" onclick="window.location.href='form_selanjutnya.html'">Verifikasi</button>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="../../js/main.js"></script>
  
  <script>
    const otpInputs = document.querySelectorAll('.otp-box');

    // Tunggu sampai halaman selesai dimuat
document.addEventListener("DOMContentLoaded", function() {
  
  // 1. Ambil nomor dari memori browser yang disimpan tadi
  const nomorTersimpan = sessionStorage.getItem('nomorPasien');
  
  // 2. Cek apakah ada nomor yang tersimpan
  if (nomorTersimpan && nomorTersimpan.length >= 4) {
    // Ambil 4 angka pertama saja (contoh: 0881)
    const empatAngkaDepan = nomorTersimpan.substring(0, 4);
    
    // Gabungkan dengan efek sensor
    const nomorDisensor = "To " + empatAngkaDepan + "_ _ _ _";
    
    // 3. Tampilkan di layar menggantikan teks bawaan
    document.getElementById('teksTujuanOTP').innerText = nomorDisensor;
  }
});

    otpInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (input.value.length === 1 && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && input.value === '' && index > 0) {
          otpInputs[index - 1].focus();
        }
      });
    });
  </script>
</body>
</html>
