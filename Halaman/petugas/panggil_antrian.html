<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lihat Antrian - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/lihatantrian.css" />
  <link rel="stylesheet" href="../../css/dashboard.css" />  

</head>
<body>

<div id="toast-container"></div>

  <div class="dashboard-container">
    

    <aside class="sidebar-dashboard">
      <div class="sidebar-logo">
        <img src="../../assets/logo/Logors.png" alt="Logo" />
        <span>Rumah Sakit<br><small>Viamedika</small></span>
      </div>

      <a href="dashboard_petugas.html" class="menu-item">
        <img src="../../assets/icons/beranda.png" alt="Home" width="27">
        <span>Dashboard</span>
      </a>
      <a href="antrianbypetugas.html" class="menu-item"> 
        <img src="../../assets/icons/pendaftaran.png" alt="Daftar" width="20">
        <span>Pendaftaran</span>
      </a>
      <a href="panggil_antrian.html" class="menu-item active">
        <img src="../../assets/icons/panggill.png" alt="Antrian" width="20">
        <span>Lihat Antrian</span>
      </a>
    </aside>

    <main class="main-content">
      <div class="header-area">
        <h1 class="page-title">Antrian Pasien</h1>
        <div class="profile-area">
          <img src="../../assets/images/my.jpg" alt="Profile" class="profile-img">
          <div class="profile-text">
            <strong>Petugas</strong>
            <span>Nulla</span>
          </div>
        </div>
      </div>


      <div class="queue-container">
        <div class="current-card" id="cardBerlangsung">
          <div class="badge-berlangsung">Berlangsung</div>
          <h1 class="current-no" id="berlangsungNo">A-001</h1>
          <h2 class="current-name" id="berlangsungName">Mr. Rajwa Shahifa</h2>
          <p class="current-unit">Kedokteran Umum • Dr. James Unit</p>
          
        

          <div class="action-buttons">
            <button class="btn-action btn-lewati" id="btnLewati" onclick="lewatiAntrian()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 4 15 12 5 20 5 4"></polygon>
                <line x1="19" y1="5" x2="19" y2="19"></line>
              </svg>
              <span>Lewati</span>
            </button>

            <button class="btn-action btn-recall" id="btnRecall" onclick="recallAntrian()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 .49-3.15"></path>
              </svg>
              <span>Recall</span>
            </button>

            <button class="btn-action btn-berikutnya" id="btnBerikutnya" onclick="berikutnyaAntrian()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
              <span>Berikutnya</span>
            </button>

          </div>
        </div>

        <div class="waiting-card">
          <div class="waiting-header">
            <div class="waiting-title-area">
              <div class="icon-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
              </div>
              <div class="waiting-title">
                <h3>Antrian</h3>
                <span>General Medicine</span>
              </div>
            </div>
            <div class="badge-tertunda" id="jumlahTertunda">4 Tertunda</div>
          </div>

          <div class="waiting-list" id="waitingListContainer">

          </div>
        </div>

      </div>

    </main>
  </div>

  <script>
    
    const API_BASE = 'http://kelompok1-rs.test/api'; 
    const UNIT_ID  = 1; 
    function getToken() {
      return localStorage.getItem('token') || '';
    }

    function authHeader() {
      const token = getToken();
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    let dataAntrian = [
      { id: 1, no: "A-001", name: "Mr. Rajwa Shahifa",   time: "Sedang Dilayani" },
      { id: 2, no: "A-002", name: "Mr. Maulana",         time: "Menunggu 15m" },
      { id: 3, no: "A-003", name: "Mr. Ivan Adinata",    time: "Menunggu 22m" },
      { id: 4, no: "A-004", name: "Mr. Akhmad Saputra",  time: "Menunggu 28m" },
      { id: 5, no: "A-005", name: "Mr. Firdaus",         time: "Menunggu 35m" },
      { id: 6, no: "A-006", name: "Ms. Cia",             time: "Menunggu 42m" },
      { id: 7, no: "A-007", name: "Mr. Budi Santoso",    time: "Menunggu 50m" },
      { id: 8, no: "A-008", name: "Ms. Siti Aminah",     time: "Menunggu 58m" }
    ];

    function updateTampilanAntrian() {
      if (dataAntrian.length === 0) {
        document.getElementById("berlangsungNo").innerText   = "-";
        document.getElementById("berlangsungName").innerText = "Tidak ada antrian";
        document.getElementById("jumlahTertunda").innerText  = "0 Tertunda";
        document.getElementById("waitingListContainer").innerHTML =
          "<center><p style='color:#888; margin-top:50px;'>Antrian Kosong</p></center>";
        clearInterval(timerInterval);
        document.getElementById("timerText").innerText = "00:00";
        setButtonsDisabled(true);
        return;
      }

      const pasienSekarang = dataAntrian[0];

      const card = document.getElementById("cardBerlangsung");
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'slideUp 0.5s ease';

      document.getElementById("berlangsungNo").innerText   = pasienSekarang.no;
      document.getElementById("berlangsungName").innerText = pasienSekarang.name;
      const listContainer = document.getElementById("waitingListContainer");
      listContainer.innerHTML = "";

      const tertundaCount = dataAntrian.length - 1;
      document.getElementById("jumlahTertunda").innerText = tertundaCount + " Tertunda";

      for (let i = 1; i < Math.min(dataAntrian.length, 5); i++) {
        const p   = dataAntrian[i];
        const div = document.createElement("div");
        div.className = "list-item";
        div.innerHTML = `
          <div class="item-no"><span>No.</span><strong>${p.no}</strong></div>
          <div class="item-info">
            <h4>${p.name}</h4>
            <p>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
              </svg>
              ${p.time} • Unit
            </p>
          </div>
        `;
        listContainer.appendChild(div);
      }

      setButtonsDisabled(false);
    }

    function setButtonsDisabled(state) {
      ['btnLewati','btnRecall','btnBerikutnya'].forEach(id => {
        document.getElementById(id).disabled = state;
      });
    }

    async function lewatiAntrian() {
      if (dataAntrian.length === 0) return;
      const pasien = dataAntrian[0];
      setButtonsDisabled(true);

      try {
        const res = await fetch(`${API_BASE}/antrian/${pasien.id}/selesai`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', ...authHeader() }
        });

        if (res.ok) {
          showToast('info', `Antrian ${pasien.no} dilewati.`);
          dataAntrian.shift();
          waktuSisa = 10;
          updateTampilanAntrian();
        } else {
          const err = await res.json().catch(() => ({}));
          showToast('error', err.message || 'Gagal melewati antrian.');
          setButtonsDisabled(false);
        }
      } catch (e) {
        showToast('error', 'Koneksi gagal. Coba lagi.');
        setButtonsDisabled(false);
      }
    }

    async function recallAntrian() {
      if (dataAntrian.length === 0) return;
      const pasien = dataAntrian[0];
      setButtonsDisabled(true);

      try {
        const res = await fetch(`${API_BASE}/antrian/${pasien.id}/panggil`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeader() }
        });

        if (res.ok) {
          showToast('success', `Memanggil ulang ${pasien.no} — ${pasien.name}`);
          waktuSisa = 10; 
          document.getElementById("timerText").innerText = "00:10";
        } else {
          const err = await res.json().catch(() => ({}));
          showToast('error', err.message || 'Gagal recall antrian.');
        }
      } catch (e) {
        showToast('error', 'Koneksi gagal. Coba lagi.');
      } finally {
        setButtonsDisabled(false);
      }
    }

    async function berikutnyaAntrian() {
      if (dataAntrian.length === 0) return;
      const pasienSekarang = dataAntrian[0];
      setButtonsDisabled(true);

      try {
        const res = await fetch(`${API_BASE}/antrian/unit/${UNIT_ID}/panggil-berikutnya`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeader() }
        });

        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          showToast('success', `Memanggil antrian berikutnya.`);

          if (data && data.no_antrian) {
            dataAntrian[0] = {
              id:   data.id   || pasienSekarang.id,
              no:   data.no_antrian,
              name: data.nama_pasien || data.name || '-',
              time: 'Sedang Dilayani'
            };
          } else {
            dataAntrian.shift();
          }

          waktuSisa = 10;
          updateTampilanAntrian();
        } else {
          const err = await res.json().catch(() => ({}));
          showToast('error', err.message || 'Gagal memanggil antrian berikutnya.');
          setButtonsDisabled(false);
        }
      } catch (e) {
        showToast('error', 'Koneksi gagal. Coba lagi.');
        setButtonsDisabled(false);
      }
    }


    function showToast(type, msg) {
      const icons = {
        success: '✅',
        error:   '❌',
        info:    'ℹ️'
      };
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.transition = 'opacity 0.4s';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 400);
      }, 3500);
    }

    window.onload = () => {
      updateTampilanAntrian();
      mulaiTimer();
    };
  </script>
</body>
</html>
