<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lihat Antrian - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/lihatantrian.css" />
  <link rel="stylesheet" href="../../css/dashboard.css" />  

</head>
<body>

  <div class="dashboard-container">
    
    <!-- SIDEBAR KIRI -->
    <aside class="sidebar-dashboard">
      <div class="sidebar-logo">
        <img src="../../assets/logo/Logors.png" alt="Logo" />
        <span>Rumah Sakit<br><small>Viamedika</small></span>
      </div>

      <!-- Menu Items -->
      <a href="dashboard_petugas.html" class="menu-item">
        <img src="../../assets/icons/beranda.png" alt="Home" width="27">
        <span>Dashboard</span>
      </a>
      <a href="antrianbypetugas.html" class="menu-item"> 
        <img src="../../assets/icons/pendaftaran.png" alt="Daftar" width="20">
        <span>Pendaftaran</span>
      </a>
      <a href="panggil_antrian.html" class="menu-item active">
        <img src="../../assets/icons/panggill.png" alt="Antrian" width="20">
        <span>Lihat Antrian</span>
      </a>
    </aside>

    <!-- KONTEN KANAN -->
    <main class="main-content">
      
      <!-- HEADER -->
      <div class="header-area">
        <h1 class="page-title">Antrian Pasien</h1>
        <div class="profile-area">
          <img src="../../assets/images/my.jpg" alt="Profile" class="profile-img">
          <div class="profile-text">
            <strong>Petugas</strong>
            <span>Nulla</span>
          </div>
        </div>
      </div>

      <!-- AREA ANTRIAN -->
      <div class="queue-container">
        
        <!-- KOTAK KIRI (BERLANGSUNG) -->
        <div class="current-card" id="cardBerlangsung">
          <div class="badge-berlangsung">Berlangsung</div>
          <h1 class="current-no" id="berlangsungNo">A-001</h1>
          <h2 class="current-name" id="berlangsungName">Mr. Rajwa Shahifa</h2>
          <p class="current-unit">Kedokteran Umum • Dr. James Unit</p>
          
          <div class="timer-badge">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <span id="timerText">00:10</span>
          </div>
        </div>

        <!-- KOTAK KANAN (DAFTAR TUNGGU) -->
        <div class="waiting-card">
          <div class="waiting-header">
            <div class="waiting-title-area">
              <div class="icon-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
              </div>
              <div class="waiting-title">
                <h3>Antrian</h3>
                <span>General Medicine</span>
              </div>
            </div>
            <div class="badge-tertunda" id="jumlahTertunda">4 Tertunda</div>
          </div>

          <!-- LIST DAFTAR TUNGGU -->
          <div class="waiting-list" id="waitingListContainer">
            <!-- Isi list akan dimuat otomatis oleh JavaScript -->
          </div>
        </div>

      </div>

    </main>
  </div>

  <!-- SCRIPT LOGIKA ANTRIAN LOOPING -->
  <script>
    // 1. DATA DATABASE PALSU (Bisa ditambah sampai panjang)
    // Cia, Budi, Siti disiapkan di antrian paling belakang
    let dataAntrian = [
      { no: "A-001", name: "Mr. Rajwa Shahifa", time: "Sedang Dilayani" },
      { no: "A-002", name: "Mr. Maulana", time: "Menunggu 15m" },
      { no: "A-003", name: "Mr. Ivan Adinata", time: "Menunggu 22m" },
      { no: "A-004", name: "Mr. Akhmad Saputra", time: "Menunggu 28m" },
      { no: "A-005", name: "Mr. Firdaus", time: "Menunggu 35m" },
      { no: "A-006", name: "Ms. Cia", time: "Menunggu 42m" },
      { no: "A-007", name: "Mr. Budi Santoso", time: "Menunggu 50m" },
      { no: "A-008", name: "Ms. Siti Aminah", time: "Menunggu 58m" }
    ];

    // Waktu mundur per pasien (Aku set 10 detik biar kamu bisa liat geraknya cepat)
    // Kalau mau normal misal 5 menit, ganti jadi: let waktuSisa = 300;
    let waktuSisa = 10; 
    let timerInterval;

    // FUNGSI RENDER TAMPILAN
    function updateTampilanAntrian() {
      // Jika antrian habis
      if (dataAntrian.length === 0) {
        document.getElementById("berlangsungNo").innerText = "-";
        document.getElementById("berlangsungName").innerText = "Tidak ada antrian";
        document.getElementById("jumlahTertunda").innerText = "0 Tertunda";
        document.getElementById("waitingListContainer").innerHTML = "<center><p style='color:#888; margin-top:50px;'>Antrian Kosong</p></center>";
        clearInterval(timerInterval);
        document.getElementById("timerText").innerText = "00:00";
        return;
      }

      // 1. Update Pasien Berlangsung (Data pertama di Array, index 0)
      let pasienSekarang = dataAntrian[0];
      
      // Kasih efek kedip halus pas pergantian nama
      let cardBerlangsung = document.getElementById("cardBerlangsung");
      cardBerlangsung.style.animation = 'none';
      cardBerlangsung.offsetHeight; /* trigger reflow */
      cardBerlangsung.style.animation = 'slideUp 0.5s ease';

      document.getElementById("berlangsungNo").innerText = pasienSekarang.no;
      document.getElementById("berlangsungName").innerText = pasienSekarang.name;

      // 2. Update Daftar Tunggu (Data index 1 sampai maksimal 4 orang ke bawah)
      let listContainer = document.getElementById("waitingListContainer");
      listContainer.innerHTML = ""; // Bersihkan list lama

      let tertundaCount = dataAntrian.length - 1;
      document.getElementById("jumlahTertunda").innerText = tertundaCount + " Tertunda";

      // Loop sisa pasien untuk ditampilkan di kanan (maksimal 4 orang di layar)
      for (let i = 1; i < Math.min(dataAntrian.length, 5); i++) {
        let p = dataAntrian[i];
        let div = document.createElement("div");
        div.className = "list-item";
        div.innerHTML = `
          <div class="item-no"><span>No.</span><strong>${p.no}</strong></div>
          <div class="item-info">
            <h4>${p.name}</h4>
            <p>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              ${p.time} • Unit
            </p>
          </div>
        `;
        listContainer.appendChild(div);
      }
    }

    // FUNGSI JALANIN TIMER
    function mulaiTimer() {
      timerInterval = setInterval(() => {
        waktuSisa--;

        // Format waktu jadi MM:SS
        let menit = Math.floor(waktuSisa / 60);
        let detik = waktuSisa % 60;
        document.getElementById("timerText").innerText = 
          (menit < 10 ? "0" : "") + menit + ":" + (detik < 10 ? "0" : "") + detik;

        // Kalau waktu habis
        if (waktuSisa <= 0) {
          // Hapus pasien pertama (Rajwa selesai!)
          dataAntrian.shift(); 
          
          // Reset timer ke 10 detik lagi untuk pasien berikutnya
          waktuSisa = 10; 
          
          // Perbarui layar (Maulana akan naik ke kiri, Cia akan muncul di kanan)
          updateTampilanAntrian(); 
        }
      }, 1000); // Jalan setiap 1000ms = 1 detik
    }

    // JALANKAN SAAT HALAMAN DIBUKA
    window.onload = () => {
      updateTampilanAntrian();
      mulaiTimer();
    };
  </script>
</body>
</html>
