<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cetak Nomor Antrian - Petugas RS Viamedika</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <!-- Sesuaikan path CSS-nya dengan direktori Anda -->
  <link rel="stylesheet" href="../../css/cetakkartubaru.css" />
</head>
<body>

  <div class="header-logo">
    <img src="../../assets/logo/Logors.png" alt="Logo" onerror="this.src='https://placehold.co/100/005461/white?text=VM'" />
    <span>Rumah Sakit<br><small>Viamedika</small></span>
  </div>

  <div class="content-wrapper">
    <h2 class="page-title">Tiket Antrian Pasien</h2>

    <div class="ticket-card" id="areaTiket">
      <p class="tc-title">Nomor Antrian</p>
      <h1 class="tc-number" id="teksNomorAntrian">--</h1>
      
      <p class="tc-title">Jadwal Antrian</p>
      <p class="tc-grey" id="teksJadwal">Memuat jadwal...</p>
      
      <p class="tc-title" id="teksUnit" style="font-size: 18px; color: #005461;">Memuat Unit...</p>
      <p class="tc-title" style="margin-top: 5px;" id="teksSisaAntrian">Ada - Antrian Didepan</p>
      <p class="tc-grey" style="margin-top: 4px;" id="teksEstimasi">Estimasi Dipanggil: --:--</p>
      <p class="tc-title" style="margin-top: 15px;">-Terima Kasih-</p>
    </div>

    <div class="action-buttons">
      <button type="button" class="btn-cetak" onclick="simpanKePNG()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 6 2 18 2 18 9"></polyline>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
            <rect x="6" y="14" width="12" height="8"></rect>
        </svg>
        Cetak Nomor Antrian (PNG)
      </button>
      <button type="button" class="btn-kembali" onclick="kembaliKePendaftaran()">
        Kembali Ke Pendaftaran
      </button>
    </div>
  </div>

  <div class="footer-wrapper">
    <img src="../../assets/images/omkedok.png" alt="Dokter 3D" class="doctor-img" onerror="this.style.display='none'"/>
    <div class="footer-banner">
      Silakan sampaikan tiket ini kepada pasien untuk menunggu antrian.
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Mengambil data dari sessionStorage hasil pendaftaran oleh petugas
      const rawData = sessionStorage.getItem("dataPasienBaru");

      if (rawData) {
        const parsedData = JSON.parse(rawData);
        
        // Fleksibilitas format response API (mengantisipasi jika data dibungkus dalam 'tiket' atau dikembalikan langsung)
        const tiket = parsedData.tiket || parsedData.antrian || parsedData;

        // 1. Nomor Antrian
        document.getElementById("teksNomorAntrian").innerText = tiket.kode_antrian || tiket.nomor_antrian || "A-000";

        // 2. Nama Unit
        document.getElementById("teksUnit").innerText = tiket.unit || tiket.nama_unit || "Unit Tujuan";

        // 3. Sisa Antrian di depan
        const sisaAntrian = tiket.antrian_di_depan ?? 0;
        document.getElementById("teksSisaAntrian").innerText = `Ada ${sisaAntrian} Antrian Didepan`;

        // 4. Estimasi Pemanggilan
        const estimasiJam = tiket.estimasi?.perkiraan_jam || tiket.perkiraan_jam || "--:--";
        document.getElementById("teksEstimasi").innerText = `Estimasi Dipanggil: ${estimasiJam}`;

        // 5. Tanggal & Jadwal
        const tanggalMentah = tiket.tanggal || tiket.tanggal_antrian;
        const tgl = tanggalMentah ? new Date(tanggalMentah + "T00:00:00") : new Date(); // Tambahan T00:00:00 menghindari timezone shift
        
        const namaHari  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
        const namaBulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli',
                           'Agustus','September','Oktober','November','Desember'];

        document.getElementById("teksJadwal").innerHTML =
          `${namaHari[tgl.getDay()]}, ${tgl.getDate()} ${namaBulan[tgl.getMonth()]} ${tgl.getFullYear()}<br>Estimasi Pukul ${estimasiJam}`;
      } else {
        alert("Data antrian tidak ditemukan! Anda akan dikembalikan ke halaman pendaftaran.");
        window.location.href = 'antrianbypetugas.html';
      }
    });

    // Fungsi Simpan Tiket Jadi PNG menggunakan html2canvas
    function simpanKePNG() {
  const element = document.getElementById("areaTiket");
  const judul = document.querySelector(".page-title");
  
  if (!element) return;

  // 1. Buat kontainer pembungkus sementara
  const wrapper = document.createElement("div");
  
  // 2. Set style Flexbox agar semua konten berada tepat di tengah kotak
  wrapper.style.display = "flex";
  wrapper.style.flexDirection = "column";
  wrapper.style.alignItems = "center";
  wrapper.style.justifyContent = "center"; // Membuat konten center secara vertikal
  wrapper.style.backgroundColor = "white";
  wrapper.style.boxSizing = "border-box";
  wrapper.style.padding = "30px";
  
  // 3. FORCE UKURAN MENJADI PERSEGI KOTAK SAMA SISI (1:1)
  // Ukuran 420px biasanya sangat pas untuk menampung judul dan kartu tiket
  const ukuranKotak = "420px"; 
  wrapper.style.width = ukuranKotak;
  wrapper.style.height = ukuranKotak;
  
  // 4. Kloning Judul (.page-title)
  if (judul) {
    const judulClone = judul.cloneNode(true);
    judulClone.style.marginTop = "0";
    judulClone.style.marginBottom = "20px";
    judulClone.style.fontSize = "20px"; // Sedikit dikecilkan agar proporsional di dalam gambar kotak
    wrapper.appendChild(judulClone);
  }
  
  // 5. Kloning Area Tiket
  const tiketClone = element.cloneNode(true);
  
  // Hilangkan margin luar & bayangan bawaan css agar tidak merusak kalkulasi center html2canvas
  tiketClone.style.margin = "0";
  tiketClone.style.boxShadow = "none";
  // Jika di CSS Anda .ticket-card menggunakan border tipis, kita bisa pastikan di sini
  tiketClone.style.border = "1px solid #777"; 
  
  wrapper.appendChild(tiketClone);
  
  // Masukkan wrapper ke dalam dokumen agar bisa dirender oleh html2canvas
  document.body.appendChild(wrapper);

  // 6. Proses konversi ke berkas gambar PNG
  html2canvas(wrapper, {
    backgroundColor: "#ffffff",
    scale: 2 // Skala 2x agar hasil gambar jernih dan tidak pecah
  }).then(canvas => {
    const link = document.createElement("a");
    
    // Penamaan file dinamis berdasarkan nomor antrian dari elemen teks asli di halaman
    const elNoAntrian = document.getElementById("teksNomorAntrian") || document.getElementById("teksNomorAntrianLama");
    const noAntrian = elNoAntrian ? elNoAntrian.innerText.trim() : "A-001";
    
    link.download = `Tiket-Antrian-${noAntrian}-Viamedika.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    
    // Hapus elemen wrapper sementara dari body setelah sukses download
    document.body.removeChild(wrapper);
  }).catch(err => {
    console.error("Gagal mendownload tiket:", err);
    if (document.body.contains(wrapper)) {
      document.body.removeChild(wrapper);
    }
  });
}

    // Fungsi Kembali dan reset temporary storage
    function kembaliKePendaftaran() {
      sessionStorage.removeItem("dataPasienBaru");
      window.location.href = 'antrianbypetugas.html';
    }
  </script>
</body>
</html>
