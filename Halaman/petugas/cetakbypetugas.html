<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cetak Nomor Antrian Pasien Baru - Rumah Sakit Viamedika</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- LIBRARY UNTUK SIMPAN PNG -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="../../css/cetakkartubaru.css" />
</head>
<body>

  <div class="header-logo">
    <img src="../../assets/logo/Logors.png" alt="Logo" />
    <span>Rumah Sakit<br><small>Viamedika</small></span>
  </div>

  <div class="content-wrapper">
    <!-- Ini Judul pengganti Stepper -->
    <h2 class="page-title">Tiket Antrian</h2>

    <!-- Area Tiket -->
    <div class="ticket-card" id="areaTiket">
      <p class="tc-title">Nomor Antrian</p>
      <h1 class="tc-number">A-001</h1>
      <p class="tc-title">Jadwal Antrian</p>
      <p class="tc-grey">Senin, 27 April 2026<br>Pukul 10.00</p>
      <p class="tc-title" id="teksUnit">Unit APA</p>
      <p class="tc-title" style="margin-top: 5px;">Ada 10 Antrian Didepan</p>
      <p class="tc-title" style="margin-top: 15px;">-Terima Kasih-</p>
    </div>

    <!-- Tombol Aksi -->
    <div class="action-buttons">
      <button type="button" class="btn-cetak" onclick="simpanKePNG()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        Cetak Nomor Antrian
      </button>
      <button type="button" class="btn-kembali" onclick="window.location.href='dashboard_petugas.html'">
        Kembali Ke Halaman Utama
      </button>
    </div>
  </div>

  <div class="footer-wrapper">
    <img src="../../assets/images/omkedok.png" alt="Dokter 3D" class="doctor-img" />
    <div class="footer-banner">
      Silakan Datang Sesuai dengan Jadwal yang diberikan untuk menghindari keterlambatan
    </div>
  </div>

  <script>
    // FUNGSI 1: Ambil Nama Poli dari halaman sebelumnya
    document.addEventListener("DOMContentLoaded", function() {
      var unitDisimpan = localStorage.getItem("unitDisimpan");
      if (unitDisimpan) {
        document.getElementById("teksUnit").innerText = unitDisimpan;
      }
    });

    // FUNGSI 2: Simpan Tiket Jadi Gambar PNG
    function simpanKePNG() {
      const element = document.getElementById("areaTiket");
      
      // Ambil judul "Tiket Antrian" biar ikutan ke-foto
      const judul = document.querySelector(".page-title");
      
      // Kita bungkus sementara tiket & judulnya biar kefoto rapi
      const wrapper = document.createElement("div");
      wrapper.style.padding = "20px";
      wrapper.style.backgroundColor = "white";
      wrapper.style.display = "flex";
      wrapper.style.flexDirection = "column";
      wrapper.style.alignItems = "center";
      
      const judulClone = judul.cloneNode(true);
      judulClone.style.marginTop = "0"; // Reset margin atas pas di-foto
      
      wrapper.appendChild(judulClone);
      wrapper.appendChild(element.cloneNode(true));
      
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        backgroundColor: "#ffffff",
        scale: 2 
      }).then(canvas => {
        const link = document.createElement("a");
        link.download = "Antrian-Baru-Viamedika.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
        
        // Hapus elemen sementara setelah beres difoto
        document.body.removeChild(wrapper);
      });
    }
  </script>
</body>
</html>
