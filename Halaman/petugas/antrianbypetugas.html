<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Petugas - RS Viamedika</title>

    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/panggilbypetugas.css">    
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div id="toast-container"></div>

<div class="dashboard-container">
    <aside class="sidebar-dashboard">
        <div class="sidebar-logo">
            <img src="../../assets/logo/Logors.png" alt="Logo" onerror="this.src='https://placehold.co/100/005461/white?text=VM'">
            <span>Rumah Sakit<br><small>Viamedika</small></span>
        </div>
        
        <a href="dashboard_petugas.html" class="menu-item">
            <img src="../../assets/icons/beranda.png" alt="Home" width="27">
            <span>Dashboard</span>
        </a>

        <a href="antrianbypetugas.html" class="menu-item active">
            <img src="../../assets/icons/pendaftaran.png" alt="Daftar" width="20">
            <span>Pendaftaran</span>
        </a>

        <a href="panggil_antrian.html" class="menu-item">
            <img src="../../assets/icons/panggill.png" alt="Antrian" width="20">
            <span>Lihat Antrian</span>
        </a>
    </aside>

    <div class="main-content">
        
        <div class="top-profile" onclick="toggleProfile()">
            <div class="info-user">
                <span class="role" id="profileRole">Admin Perawat</span>
                <span class="name" id="namaPertugas">Memuat...</span>
            </div>
            <img src="https://ui-avatars.com/api/?name=Petugas&background=005461&color=fff" alt="Profile" id="headerAvatar">

            <div class="profile-popup" id="profilePopup">
                <span class="close-popup" onclick="toggleProfile(); event.stopPropagation();">&times;</span>
                <img id="popupAvatar" src="https://ui-avatars.com/api/?name=Petugas&background=005461&color=fff" class="img-large" alt="Profile">
                <h4 id="popupName">Memuat...</h4>
                <p class="popup-role" id="popupRoleDisplay">Admin Perawat</p>
                <div class="popup-btns">
                    <button class="btn-logout" onclick="logout(event)">Keluar</button>
                </div>
            </div>
        </div>

        <div class="header-area">
            <h1 class="user-name">Pembuatan Tiket</h1>
        </div>

        <div class="form-card">
            <h2 class="form-title">
                <i class="fa-regular fa-id-card"></i> Biodata Pasien
            </h2>

            <form id="formPendaftaran">
                <div class="form-grid">

                    <div class="input-group">
                        <label>Nomor Induk Kependudukan (NIK) <span>*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-id-card"></i>
                            <input type="text" id="nik" name="nik" placeholder="Masukkan NIK (16 digit)" maxlength="16" required>
                        </div>
                        <div id="nikStatus" style="display:none; margin-top:6px; font-size:12px; font-weight:600; padding: 4px 10px; border-radius:8px; width:fit-content;"></div>
                    </div>

                    <div class="input-group">
                        <label>Nama Lengkap <span>*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="nama_lengkap" name="nama_lengkap" placeholder="Masukkan Nama Lengkap" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Tanggal Lahir <span>*</span></label>
                        <div class="input-wrapper">
                            <input type="date" id="tanggal_lahir" name="tanggal_lahir" class="no-icon-left" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Jenis Kelamin <span>*</span></label>
                        <div class="input-wrapper">
                            <select id="jenis_kelamin" name="jenis_kelamin" class="no-icon-left" required>
                                <option value="" disabled selected>Pilih Jenis Kelamin</option>
                                <option value="L">Laki-laki</option>
                                <option value="P">Perempuan</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Alamat <span>*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-location-dot"></i>
                            <input type="text" id="alamat" name="alamat" placeholder="Masukkan Alamat Lengkap" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Nomor Telepon / WhatsApp <span>*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone"></i>
                            <input type="text" id="no_telepon" name="no_telepon" placeholder="08xxxxxxxx" required>
                        </div>
                    </div>
                </div>

                <div class="input-group full-width" style="margin-top: 20px;">
                    <label>Pilih Unit <span>*</span></label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-building"></i>
                        <select id="unit_id" name="unit_id" required>
                            <option value="" disabled selected hidden>Memuat unit...</option>
                        </select>
                    </div>
                </div>

                <div id="errorMsg" style="display:none; background:#fee2e2; border:1px solid #fca5a5; color:#b91c1c; padding:10px 14px; border-radius:8px; font-size:13px; margin-top:12px;"></div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    <div class="spinner"></div>
                    <span class="btn-text">
                        <i class="fa-solid fa-ticket"></i>
                        Buat Nomor Antrian
                    </span>
                </button>
            </form>
        </div>

    </div>
</div>

<script>
    // ==========================================
    // 0. SCRIPT API PROFILE (Header & Popup)
    // ==========================================
    (async function initProfile() {
        const token = localStorage.getItem('rs_token');
        if (!token) {
            window.location.href = '../auth/masuk.html';
            return;
        }
        try {
            const response = await fetch('http://kelompok1-rs.test/api/auth/me', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/json' }
            });
            const result = await response.json();
            if (response.ok) {
                let namaFinal = result?.data?.name || result?.name || result?.data?.user?.name || result?.user?.name;
                let roleFinal = result?.data?.roles?.[0] || result?.roles?.[0] || result?.data?.user?.roles?.[0] || result?.user?.roles?.[0] || 'Admin Perawat';

                if (!namaFinal || namaFinal.trim() === "") {
                    const emailUser = result?.data?.user?.email || result?.user?.email || result?.data?.email || result?.email;
                    if (emailUser && emailUser.includes('@')) {
                        let namaMentah = emailUser.split('@')[0];
                        namaFinal = namaMentah.replace(/[^a-zA-Z]/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ').trim();
                    }
                }
                if (!namaFinal || namaFinal.trim() === "") namaFinal = "Petugas";

                roleFinal = roleFinal.replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

                document.getElementById('namaPertugas').innerText = namaFinal;
                document.getElementById('profileRole').innerText = roleFinal;
                document.getElementById('popupName').innerText = namaFinal;
                document.getElementById('popupRoleDisplay').innerText = roleFinal;
                
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(namaFinal)}&background=005461&color=fff`;
                document.getElementById('headerAvatar').src = avatarUrl;
                document.getElementById('popupAvatar').src = avatarUrl;
            } else {
                localStorage.removeItem('rs_token');
                window.location.href = '../auth/masuk.html';
            }
        } catch (error) {
            console.error("Gagal memuat profil:", error);
            document.getElementById('namaPertugas').innerText = "Petugas (Offline)";
            document.getElementById('popupName').innerText = "Petugas (Offline)";
        }
    })();

    function toggleProfile() {
        const popup = document.getElementById('profilePopup');
        popup.classList.toggle('show');
    }

    window.addEventListener('click', function(event) {
        if (!event.target.closest('.top-profile')) {
            const popup = document.getElementById('profilePopup');
            if (popup && popup.classList.contains('show')) popup.classList.remove('show');
        }
    });

    function logout(event) {
        event.stopPropagation();
        localStorage.removeItem('rs_token');
        window.location.href = '../auth/masuk.html';
    }


    // ==========================================
    // 1. SCRIPT API PENDAFTARAN (Bawaan)
    // ==========================================
    const API_BASE      = 'http://kelompok1-rs.test/api';
    const CEK_NIK_URL   = (nik) => `${API_BASE}/pasien/cek-nik/${nik}`;
    const UNITS_URL     = `${API_BASE}/units`;
    const DAFTAR_URL    = `${API_BASE}/pendaftaran/langsung`;

    function authHeaders() {
        const token = localStorage.getItem('rs_token');
        const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
        if (token) {
            const clean = token.trim().replace(/^"|"$/g, '');
            headers['Authorization'] = `Bearer ${clean}`;
        }
        return headers;
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
    function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

    // ── LOAD UNITS ──
    async function loadUnits() {
        const select = document.getElementById('unit_id');
        try {
            const res  = await fetch(UNITS_URL);
            const json = await res.json();
            select.innerHTML = '<option value="" disabled selected hidden>Pilih Unit</option>';
            json.data.forEach(unit => {
                const opt = document.createElement('option');
                opt.value = unit.id;
                opt.textContent = unit.nama_unit;
                opt.style.color = '#333';
                select.appendChild(opt);
            });
        } catch (err) {
            select.innerHTML = '<option value="" disabled selected hidden>Gagal memuat unit</option>';
            showError('Gagal memuat daftar unit. Periksa koneksi internet Anda.');
        }
    }

    // ── CEK NIK OTOMATIS ──
    document.getElementById('nik').addEventListener('blur', async function () {
        const nik = this.value.trim();
        const statusEl = document.getElementById('nikStatus');

        setFormEditable(true); clearPrefill();
        statusEl.style.display = 'none'; hideError();

        if (nik.length !== 16) return;

        try {
            const res  = await fetch(CEK_NIK_URL(nik), { headers: authHeaders() });
            const data = await res.json();

            if (data.terdaftar && data.data) {
                const p = data.data;
                document.getElementById('nama_lengkap').value  = p.nama_lengkap  || '';
                if (p.tanggal_lahir) document.getElementById('tanggal_lahir').value = p.tanggal_lahir.substring(0, 10);
                document.getElementById('jenis_kelamin').value = p.jenis_kelamin || '';
                document.getElementById('alamat').value        = p.alamat        || '';
                document.getElementById('no_telepon').value    = p.no_telepon    || '';

                setFormEditable(false);
                statusEl.textContent = '✓ Pasien Lama — Data terisi otomatis';
                statusEl.style.background = '#D6F0E9';
                statusEl.style.color = '#005461';
                statusEl.style.display = 'block';
            } else {
                setFormEditable(true);
                statusEl.textContent = '+ Pasien Baru — Lengkapi data di bawah';
                statusEl.style.background = '#FFF3E0';
                statusEl.style.color = '#E65100';
                statusEl.style.display = 'block';
            }
        } catch (err) {
            showError('Gagal mengecek NIK. Periksa koneksi internet Anda.');
        }
    });

    function setFormEditable(editable) {
        ['nama_lengkap', 'tanggal_lahir', 'jenis_kelamin', 'alamat', 'no_telepon'].forEach(id => {
            const el = document.getElementById(id);
            el.readOnly   = !editable; el.disabled   = !editable;
            el.style.backgroundColor = editable ? '' : '#f5f5f5';
            el.style.color = editable ? '' : '#555';
        });
    }

    function clearPrefill() {
        ['nama_lengkap','tanggal_lahir','jenis_kelamin','alamat','no_telepon'].forEach(id => {
            document.getElementById(id).value = '';
        });
    }

    // ── SUBMIT FORM ──
    document.getElementById('formPendaftaran').addEventListener('submit', async function (e) {
        e.preventDefault(); hideError();
        const btn = document.getElementById('btnSubmit');
        btn.classList.add('loading'); btn.disabled = true;

        const payload = {
            nik:           document.getElementById('nik').value.trim(),
            nama_lengkap:  document.getElementById('nama_lengkap').value.trim(),
            jenis_kelamin: document.getElementById('jenis_kelamin').value,
            tanggal_lahir: document.getElementById('tanggal_lahir').value,
            alamat:        document.getElementById('alamat').value.trim(),
            no_telepon:    document.getElementById('no_telepon').value.trim(),
            unit_id:       parseInt(document.getElementById('unit_id').value),
        };

        try {
            const res  = await fetch(DAFTAR_URL, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify(payload),
            });

            const data = await res.json().catch(() => ({}));

            if (res.ok || res.status === 201) {
                showToast('success', 'Berhasil!', 'Pasien berhasil didaftarkan. Mengalihkan ke halaman cetak...');
                if (data.data) sessionStorage.setItem('dataPasienBaru', JSON.stringify(data.data));
                setTimeout(() => { window.location.href = 'cetakbypetugas.html'; }, 1800);
            } else {
                const pesan = data?.message || data?.error || `Terjadi kesalahan (HTTP ${res.status})`;
                showError(pesan); btn.classList.remove('loading'); btn.disabled = false;
            }
        } catch (err) {
            showError('Tidak dapat menghubungi server. Periksa koneksi Anda.');
            btn.classList.remove('loading'); btn.disabled = false;
        }
    });

    // ── Toast Notifikasi ──
    function showToast(type, title, desc) {
        const container = document.getElementById('toast-container');
        const icon = type === 'success'
            ? '<i class="fa-solid fa-circle-check" style="color:#10B981;font-size:18px;"></i>'
            : '<i class="fa-solid fa-circle-xmark" style="color:#EF4444;font-size:18px;"></i>';

        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            ${icon}
            <div class="toast-msg">
                <div class="toast-title">${title}</div>
                <div class="toast-desc">${desc}</div>
            </div>
        `;
        container.appendChild(toast);

        setTimeout(() => {
            toast.style.transition = 'opacity 0.4s';
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 400);
        }, 4000);
    }
    
    // Jalankan saat halaman load
    loadUnits();
</script>

</body>
</html>
