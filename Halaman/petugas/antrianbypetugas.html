<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Petugas - RS Viamedika</title>

    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/panggilbypetugas.css">    
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<!-- Toast Container -->
<div id="toast-container"></div>

<div class="dashboard-container">
    <aside class="sidebar-dashboard">
        <div class="sidebar-logo">
            <img src="../../assets/logo/Logors.png" alt="Logo" onerror="this.src='https://placehold.co/100/005461/white?text=VM'">
            <span>Rumah Sakit<br><small>Viamedika</small></span>
        </div>
        
        <a href="dashboard_petugas.html" class="menu-item">
            <img src="../../assets/icons/beranda.png" alt="Home" width="27">
            <span>Dashboard</span>
        </a>

        <a href="antrianbypetugas.html" class="menu-item active">
            <img src="../../assets/icons/pendaftaran.png" alt="Daftar" width="20">
            <span>Pendaftaran</span>
        </a>

        <a href="panggil_antrian.html" class="menu-item">
            <img src="../../assets/icons/panggill.png" alt="Antrian" width="20">
            <span>Lihat Antrian</span>
        </a>
    </aside>

    <div class="main-content">
        
        <div class="top-profile">
            <div class="info-user">
                <span class="role">Admin Perawat</span>
                <span class="name">Jani</span>
            </div>
            <img src="https://ui-avatars.com/api/?name=Jani&background=005461&color=fff" alt="Profile">
        </div>

        <div class="header-area">
            <h1 class="user-name">Pembuatan Tiket</h1>
        </div>

        <div class="form-card">
            <h2 class="form-title">
                <i class="fa-regular fa-id-card"></i> Biodata Pasien
            </h2>

            <form id="formPendaftaran">
                <div class="form-grid">
                    <!-- NIK -->
                    <div class="input-group">
                        <label>Nomor Induk Kependudukan (NIK) <span>*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-id-card"></i>
                            <input type="text" id="nik" name="nik" placeholder="Masukkan NIK" required>
                        </div>
                    </div>

                    <!-- Nama Lengkap -->
                    <div class="input-group">
                        <label>Nama Lengkap <span>*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="nama_lengkap" name="nama_lengkap" placeholder="Masukkan Nama Lengkap" required>
                        </div>
                    </div>

                    <!-- Tanggal Lahir -->
                    <div class="input-group">
                        <label>Tanggal Lahir <span>*</span></label>
                        <div class="input-wrapper">
                            <input type="date" id="tanggal_lahir" name="tanggal_lahir" class="no-icon-left" required>
                        </div>
                    </div>

                    <!-- Jenis Kelamin -->
                    <div class="input-group">
                        <label>Jenis Kelamin <span>*</span></label>
                        <div class="input-wrapper">
                            <select id="jenis_kelamin" name="jenis_kelamin" class="no-icon-left" required>
                                <option value="" disabled selected>Pilih Jenis Kelamin</option>
                                <option value="L">Laki-laki</option>
                                <option value="P">Perempuan</option>
                            </select>
                        </div>
                    </div>

                    <!-- Alamat -->
                    <div class="input-group">
                        <label>Alamat <span>*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-location-dot"></i>
                            <input type="text" id="alamat" name="alamat" placeholder="Masukkan Alamat Lengkap" required>
                        </div>
                    </div>

                    <!-- No Telepon -->
                    <div class="input-group">
                        <label>Nomor Telepon / WhatsApp <span>*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone"></i>
                            <input type="text" id="no_telepon" name="no_telepon" placeholder="08xxxxxxxx" required>
                        </div>
                    </div>
                </div>

                <!-- Pilih Unit -->
                <div class="input-group full-width" style="margin-top: 20px;">
                    <label>Pilih Unit <span>*</span></label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-building"></i>
                        <select id="unit_id" name="unit_id" required>
                            <option value="" disabled selected hidden>Pilih Unit</option>
                            <option value="1">Poli Mata</option>
                            <option value="2">Poli Gigi</option>
                            <option value="3">Poli Penyakit Dalam</option>
                            <option value="6">Poli KIA (Ibu & Anak)</option>
                            <option value="7">Poli Anak</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    <div class="spinner"></div>
                    <span class="btn-text">
                        <i class="fa-solid fa-ticket"></i>
                        Buat Nomor Antrian
                    </span>
                </button>
            </form>
        </div>

    </div>
</div>

<script>
    const API_BASE = 'http://kelompok1-rs.test/api/pasien'; // Ganti dengan base URL API kamu

    // Handle submit form
    document.getElementById('formPendaftaran').addEventListener('submit', async function (e) {
        e.preventDefault();

        const btn = document.getElementById('btnSubmit');
        btn.classList.add('loading');
        btn.disabled = true;

        // Kumpulkan data form
        const payload = {
            nik:           document.getElementById('nik').value.trim(),
            nama_lengkap:  document.getElementById('nama_lengkap').value.trim(),
            jenis_kelamin: document.getElementById('jenis_kelamin').value,
            tanggal_lahir: document.getElementById('tanggal_lahir').value,
            alamat:        document.getElementById('alamat').value.trim(),
            no_telepon:    document.getElementById('no_telepon').value.trim(),
        };

        try {
            const token = localStorage.getItem('token') || '';

            const response = await fetch(`${API_BASE}/pasien`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                },
                body: JSON.stringify(payload),
            });

            const data = await response.json();

            if (response.ok || response.status === 201) {
                showToast('success', 'Berhasil!', 'Pasien berhasil didaftarkan. Mengalihkan ke halaman cetak...');
                
                // Simpan data respons jika dibutuhkan halaman cetak
                if (data) {
                    sessionStorage.setItem('dataPasienBaru', JSON.stringify(data));
                }

                setTimeout(() => {
                    window.location.href = 'cetakbypetugas.html';
                }, 1800);
            } else {
                const pesan = data?.message || data?.error || 'Terjadi kesalahan pada server.';
                showToast('error', 'Gagal!', pesan);
                btn.classList.remove('loading');
                btn.disabled = false;
            }

        } catch (err) {
            console.error('Error:', err);
            showToast('error', 'Koneksi Gagal', 'Tidak dapat menghubungi server. Periksa koneksi Anda.');
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    });

    // Fungsi tampilkan toast notifikasi
    function showToast(type, title, desc) {
        const container = document.getElementById('toast-container');
        const icon = type === 'success'
            ? '<i class="fa-solid fa-circle-check" style="color:#10B981;font-size:18px;"></i>'
            : '<i class="fa-solid fa-circle-xmark" style="color:#EF4444;font-size:18px;"></i>';

        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            ${icon}
            <div class="toast-msg">
                <div class="toast-title">${title}</div>
                <div class="toast-desc">${desc}</div>
            </div>
        `;
        container.appendChild(toast);

        setTimeout(() => {
            toast.style.transition = 'opacity 0.4s';
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 400);
        }, 4000);
    }
</script>

</body>
</html>
