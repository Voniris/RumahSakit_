<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Informasi Viamedika</title>
</head>
<body>
    <p>Memuat...</p>

    <script>
      const BASE_URL = "https://daftar4b06.vps-poliban.my.id/api";

        (async function cekSesiDanRedirect() {
            const token = localStorage.getItem('rs_token');

            if (!token) {
                window.location.href = "Halaman/auth/masuk.html";
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/auth/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    localStorage.removeItem('rs_token');
                    window.location.href = "Halaman/auth/masuk.html";
                    return;
                }

                const result = await response.json();
                const userRoles = result?.data?.roles || result?.roles || result?.data?.user?.roles || result?.user?.roles || [];

                if (userRoles.includes('superadmin')) {
                    window.location.href = "Halaman/super_admin/dashboard_superadmin.html";
                } else if (userRoles.includes('admin_perawat') || userRoles.includes('petugas') || userRoles.includes('perawat') || userRoles.includes('dokter')) {
                    window.location.href = "Halaman/petugas/dashboard_petugas.html";
                } else if (userRoles.includes('pasien')) {
                    window.location.href = "Halaman/pasien/dashboard_pasien.html";
                } else {
                    window.location.href = "Halaman/auth/masuk.html";
                }
            } catch (error) {
                console.error("Gagal validasi sesi:", error);
                window.location.href = "Halaman/auth/masuk.html";
            }
        })();
    </script>
</body>
</html>
